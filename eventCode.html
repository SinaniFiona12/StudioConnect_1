<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AED Studios - Event Code</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="logo-area">
        <div class="logo-placeholder">
          <img src="./images/Logo.svg" alt="logo" />
        </div>

        <div class="logo-text">
          <strong>AED STUDIOS</strong>

          <span>Creative Network</span>
        </div>
      </div>

      <div class="language-toggles">
        <button class="lang-btn" id="btn-nl">NL</button>

        <button class="lang-btn active" id="btn-en">EN</button>

        <button class="lang-btn" id="btn-fr">FR</button>
      </div>
    </header>

    <main class="access-page">
      <div class="access-icon">
        <img src="./images/Lock.svg" alt="Lock" />
      </div>

      <h1 data-translate="accessTitle"></h1>

      <p class="subtitle" data-translate="accessSubtitle"></p>

      <div class="error-box" id="errorBox" data-translate="errorMessage"></div>

      <input type="text" id="accessCode" data-placeholder="accessPlaceholder" />

      <button id="submitBtn" data-translate="submitBtn"></button>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <div class="nav-icon">
          <img src="./images/HomeIcon.svg" alt="Home" />
        </div>

        <span data-translate="navHome"></span>
      </a>

      <a href="map.html" class="nav-item">
        <div class="nav-icon">
          <img src="./images/MapIcontrans.svg" alt="Map" />
        </div>

        <span data-translate="navMap"></span>
      </a>

      <a href="overview.html" class="nav-item">
        <div class="nav-icon">
          <img src="./images/StudioIcontrans.svg" alt="Studio's" />
        </div>

        <span data-translate="navStudios"></span>
      </a>

      <a href="eventCode.html" class="nav-item active">
        <div class="nav-icon">
          <img src="./images/EventIconfull.svg" alt="Event" />
        </div>

        <span data-translate="navEvent"></span>
      </a>
    </nav>

    <script type="module">
  import { supabase } from "/src/supabase.js";

  const translations = {
    en: {
      accessTitle: "Access Code",
      accessSubtitle: "Enter your unique company code to view events",
      accessPlaceholder: "ENTER CODE",
      submitBtn: "SUBMIT",
      errorMessage:
        "An invite code is required to proceed. If you haven't received one, this page may not be relevant to you.",
      tryAgain: "PLEASE TRY AGAIN",
      navHome: "Home",
      navMap: "Map",
      navStudios: "Studios",
      navEvent: "Event",
    },

    nl: {
      accessTitle: "Toegangscode",
      accessSubtitle:
        "Voer je unieke bedrijfscode in om evenementen te bekijken",
      accessPlaceholder: "VOER CODE IN",
      submitBtn: "VERZENDEN",
      errorMessage:
        "Een uitnodigingscode is vereist om verder te gaan. Als je er geen hebt ontvangen, is deze pagina mogelijk niet relevant voor jou.",
      tryAgain: "PROBEER OPNIEUW",
      navHome: "Home",
      navMap: "Kaart",
      navStudios: "Studio's",
      navEvent: "Event",
    },

    fr: {
      accessTitle: "Code d'accès",
      accessSubtitle:
        "Entrez votre code d'entreprise unique pour voir les événements",
      accessPlaceholder: "ENTREZ LE CODE",
      submitBtn: "ENVOYER",
      errorMessage:
        "Un code d'invitation est requis pour continuer. Si vous n'en avez pas reçu, cette page peut ne pas vous concerner.",
      tryAgain: "RÉESSAYEZ",
      navHome: "Accueil",
      navMap: "Carte",
      navStudios: "Studios",
      navEvent: "Événement",
    },
  };

  function getCurrentLanguage() {
    return localStorage.getItem("language") || "en";
  }

  function setLanguage(language) {
    localStorage.setItem("language", language);

    document.querySelectorAll(".lang-btn").forEach((btn) => {
      btn.classList.remove("active");
    });

    document.getElementById(`btn-${language}`).classList.add("active");

    document.querySelectorAll("[data-translate]").forEach((element) => {
      const key = element.dataset.translate;
      element.textContent = translations[language][key];
    });

    document.querySelectorAll("[data-placeholder]").forEach((element) => {
      const key = element.dataset.placeholder;
      element.placeholder = translations[language][key];
    });
  }

  document.getElementById("btn-nl").addEventListener("click", () => {
    setLanguage("nl");
  });

  document.getElementById("btn-en").addEventListener("click", () => {
    setLanguage("en");
  });

  document.getElementById("btn-fr").addEventListener("click", () => {
    setLanguage("fr");
  });

  setLanguage(getCurrentLanguage());

  /*nieuw*/
  const existingAccess =
  localStorage.getItem("eventAccess");

if (existingAccess === "granted") {
  window.location.href =
    "event-overview.html";
}

  const input = document.getElementById("accessCode");
  const button = document.getElementById("submitBtn");
  const errorBox = document.getElementById("errorBox");

  input.addEventListener("input", () => {
    if (input.value.trim() !== "") {
      button.classList.add("active");
    } else {
      button.classList.remove("active");
    }
  });

  button.addEventListener("click", async () => {
    const enteredCode = input.value.trim();
    const language = getCurrentLanguage();

    errorBox.classList.remove("show");
    button.classList.remove("error");
    button.textContent = translations[language].submitBtn;

    if (enteredCode === "") {
      errorBox.classList.add("show");
      button.classList.add("error");
      button.textContent = translations[language].tryAgain;
      return;
    }

    const { data, error } = await supabase
      .from("event_codes")
      .select("*")
      .eq("code", enteredCode)
      .eq("active", true)
      .maybeSingle();

    if (error) {
      console.error(error);
      errorBox.classList.add("show");
      button.classList.add("error");
      button.textContent = translations[language].tryAgain;
      return;
    }

    if (data) {
      localStorage.setItem("eventAccess", "granted");
      localStorage.setItem("eventCode", data.code);
      localStorage.setItem("eventUserName", data.name);

      window.location.href = "event-overview.html";
    } else {
      errorBox.classList.add("show");
      button.classList.add("error");
      button.textContent = translations[language].tryAgain;
    }
  });
</script>
  </body>
</html>
