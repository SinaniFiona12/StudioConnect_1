<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>AED Studios - Map</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
        rel="stylesheet"
    >

    <style>

        :root {
            --bg-color: #282626;
            --text-color: #FDFDFD;
            --accent-color: #FE0D00;
            --card-bg: #333131;
            --font-main: 'Rubik', sans-serif;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background-color:var(--bg-color);
            color:var(--text-color);
            font-family:var(--font-main);
            overflow:hidden;
            height:100vh;
            display:flex;
            flex-direction:column;
        }

        /* HEADER */

        .main-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px;
            border-bottom:1px solid #fe0d005a;
        }

        .logo-area{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .logo-placeholder{
            width:60px;
            height:45px;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .logo-text{
            display:flex;
            flex-direction:column;
        }

        .logo-text strong{
            font-size:16px;
        }

        .logo-text span{
            color:#888;
            font-size:12px;
        }

        .language-toggles{
            display:flex;
            gap:8px;
        }

        .lang-btn{
            background:#444;
            color:white;
            border:none;
            padding:8px 14px;
            border-radius:8px;
            font-family:var(--font-main);
            font-weight:bold;
            cursor:pointer;
        }

        .lang-btn.active{
            background:var(--accent-color);
        }

        /* MAP CONTAINER */

        .map-container{
            position:relative;
            flex-grow:1;
            width:100%;
            overflow:hidden;
            background-color:#1a1919;
        }

        .map-layer{
            position:absolute;
            top:50%;
            left:50%;
            width:2000px;
            height:2000px;
            transform:
                translate(-50%, -50%);
            background-image:
                radial-gradient(
                    circle at center,
                    #282626 2px,
                    transparent 2px
                );

            background-size:40px 40px;
        }

        /* BOTTOM NAV */

        .bottom-nav{
            position:fixed;
            bottom:0;
            left:0;
            right:0;
            background:#2f2d2d;
            padding:18px 10px;
            display:flex;
            justify-content:space-around;
            border-top:
                1px solid #4a4a4a;
        }

        .nav-item{
            text-decoration:none;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:8px;
            color:#8e8e8e;
            font-size:13px;
        }

        .nav-icon{
            width:56px;
            height:56px;
            border-radius:18px;
            background:#3a3939;
            border:
                1px solid #5c5c5c;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .nav-item.active .nav-icon{
            background:
                var(--accent-color);
            border:none;
        }

    </style>
</head>

<body>

    <header class="main-header">

        <div class="logo-area">

            <div class="logo-placeholder">
                <img
                    src="./images/Logo.svg"
                    alt="logo"
                >
            </div>

            <div class="logo-text">

                <strong>
                    AED STUDIOS
                </strong>

                <span>
                    Creative Network
                </span>

            </div>

        </div>

        <div class="language-toggles">

            <button class="lang-btn">
                NL
            </button>

            <button
                class="lang-btn active"
            >
                EN
            </button>

            <button class="lang-btn">
                FR
            </button>

        </div>

    </header>

    <div
        class="map-container"
        id="map-container"
    >

        <div
            class="map-layer"
            id="map-layer"
        ></div>

    </div>

    <nav class="bottom-nav">

        <a
            href="index.html"
            class="nav-item"
        >

            <div class="nav-icon">
                <img
                    src="./images/HomeIcon.svg"
                    alt="Home"
                >
            </div>

            <span>Home</span>

        </a>

        <a
            href="map.html"
            class="nav-item active"
        >

            <div class="nav-icon">
                <img
                    src="./images/MapIcon.svg"
                    alt="Map"
                >
            </div>

            <span>Map</span>

        </a>

        <a
            href="overview.html"
            class="nav-item"
        >

            <div class="nav-icon">
                <img
                    src="./images/StudioIcontrans.svg"
                    alt="Studios"
                >
            </div>

            <span>Studios</span>

        </a>

        <a
            href="#"
            class="nav-item"
        >

            <div class="nav-icon">
                <img
                    src="./images/EventIcontrans.svg"
                    alt="Event"
                >
            </div>

            <span>Event</span>

        </a>

    </nav>

</body>
</html>
