<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Dates</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="main-header">
      <div class="logo-area">
        <div class="logo-placeholder">
          <img src="./images/Logo.svg" alt="AED Studios logo" />
        </div>

        <div class="logo-text">
          <strong>AED STUDIOS</strong>
          <span>Creative Network</span>
        </div>
      </div>

      <div class="language-toggles">
        <button class="lang-btn" id="btn-nl" type="button">NL</button>
        <button class="lang-btn active" id="btn-en" type="button">EN</button>
        <button class="lang-btn" id="btn-fr" type="button">FR</button>
      </div>
    </header>

    <main class="dates-page">
      <section class="top-section">
        <a href="event-overview.html" class="back-btn">
          <span class="back-icon">←</span>
          <span data-translate="goBack"></span>
        </a>
      </section>

      <section class="title-section">
        <h1 data-translate="chooseDate"></h1>
        <p data-translate="chooseSubtitle"></p>
      </section>

      <section class="dates-list" id="datesList"></section>

      <section class="bottom-button">
        <button id="continueBtn" type="button">
          <span data-translate="continueBtn"></span>
          <span>→</span>
        </button>
      </section>
    </main>

    <script type="module">
      import { supabase } from "/src/supabase.js";

      const translations = {
        en: {
          goBack: "Go back",
          chooseDate: "Choose a Date",
          chooseSubtitle: "Select the event that works best for you",
          continueBtn: "CONTINUE TO REGISTRATION",
          spotsAvailable: "spots available",
        },
        nl: {
          goBack: "Ga terug",
          chooseDate: "Kies een Datum",
          chooseSubtitle: "Selecteer het event dat het beste bij je past",
          continueBtn: "GA VERDER NAAR REGISTRATIE",
          spotsAvailable: "plaatsen beschikbaar",
        },
        fr: {
          goBack: "Retour",
          chooseDate: "Choisissez une Date",
          chooseSubtitle: "Sélectionnez l'événement qui vous convient le mieux",
          continueBtn: "CONTINUER VERS L'INSCRIPTION",
          spotsAvailable: "places disponibles",
        },
      };

      const eventDates = [
        {
          id: 1,
          date: "June 15, 2026",
          title: "Studio 1",
          time: "18:00 - 22:00",
          location: "Studio 1",
          maxSpots: 60,
        },
        {
          id: 2,
          date: "September 22, 2026",
          title: "Studio 1",
          time: "18:00 - 22:00",
          location: "Studio 1",
          maxSpots: 60,
        },
        {
          id: 3,
          date: "December 20, 2026",
          title: "Studio 1",
          time: "18:00 - 22:00",
          location: "Studio 1",
          maxSpots: 60,
        },
        {
          id: 4,
          date: "March 19, 2027",
          title: "Studio 1",
          time: "18:00 - 22:00",
          location: "Studio 1",
          maxSpots: 60,
        },
      ];

      const datesList = document.getElementById("datesList");
      const continueBtn = document.getElementById("continueBtn");

      let selectedEventId = localStorage.getItem("selectedEventId");

      async function getRegistrationCount(event) {
        const { count, error } = await supabase
          .from("event_registrations")
          .select("id", {
            count: "exact",
            head: true,
          })
          .eq("selected_date", event.date);

        if (error) {
          return 0;
        }

        return count || 0;
      }

      async function buildCards(language) {
        datesList.innerHTML = "";

        for (const event of eventDates) {
          const registrations = await getRegistrationCount(event);

          const availableSpots = Math.max(event.maxSpots - registrations, 0);

          const progress = Math.min(
            (registrations / event.maxSpots) * 100,
            100,
          );

          const card = document.createElement("div");
          card.className = `date-card ${
            selectedEventId == event.id ? "active" : ""
          }`;
          card.dataset.id = event.id;

          card.innerHTML = `
      <div class="date-row">
        <div class="date-icon">
          <img src="./images/EventRed.svg" alt="">
        </div>

        <div class="date-title">
          ${event.date}
        </div>
      </div>

      <div class="date-row">
        <div class="date-icon">
          <img src="./images/ClockRed.svg" alt="">
        </div>

        <div class="date-info">
          ${event.time}
        </div>
      </div>

      <div class="date-row">
        <div class="date-icon">
          <img src="./images/LocationRed.svg" alt="">
        </div>

        <div class="date-info">
          ${event.location}
        </div>
      </div>

      <div class="spots">
        <img src="./images/PeopleRed.svg" alt="">

        <span>
          ${availableSpots} ${translations[language].spotsAvailable}
        </span>
      </div>

      <div class="progress-bar">
        <div 
          class="progress-fill"
          style="width: ${progress}%"
        ></div>
      </div>
    `;

          card.addEventListener("click", () => {
            document.querySelectorAll(".date-card").forEach((item) => {
              item.classList.remove("active");
            });

            card.classList.add("active");

            selectedEventId = event.id;

            localStorage.setItem("selectedEventId", event.id);
            localStorage.setItem("selectedEventDate", event.date);
            localStorage.setItem("selectedEventTitle", event.title);
            localStorage.setItem("selectedEvent", JSON.stringify(event));

            continueBtn.classList.add("active");
          });

          datesList.appendChild(card);
        }
      }

      function setLanguage(language) {
        localStorage.setItem("language", language);

        document.querySelectorAll(".lang-btn").forEach((btn) => {
          btn.classList.remove("active");
        });

        document.getElementById(`btn-${language}`).classList.add("active");

        document.querySelectorAll("[data-translate]").forEach((element) => {
          const key = element.dataset.translate;
          element.textContent = translations[language][key];
        });

        buildCards(language);
      }

      continueBtn.addEventListener("click", () => {
        if (!selectedEventId) return;

        const selectedEvent = eventDates.find(
          (event) => event.id == selectedEventId,
        );

        localStorage.setItem("selectedEventId", selectedEvent.id);
        localStorage.setItem("selectedEventDate", selectedEvent.date);
        localStorage.setItem("selectedEventTitle", selectedEvent.title);
        localStorage.setItem("selectedEvent", JSON.stringify(selectedEvent));

        window.location.href = "Eventregistration.html";
      });

      document.getElementById("btn-nl").addEventListener("click", () => {
        setLanguage("nl");
      });

      document.getElementById("btn-en").addEventListener("click", () => {
        setLanguage("en");
      });

      document.getElementById("btn-fr").addEventListener("click", () => {
        setLanguage("fr");
      });

      if (selectedEventId) {
        continueBtn.classList.add("active");
      }

      setLanguage(localStorage.getItem("language") || "en");
    </script>
  </body>
</html>
