<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,
        initial-scale=1.0"
    >

    <title>
        Event Dates
    </title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

    </style>

</head>

<body>

<header class="main-header">

    <div class="logo-area">

        <div class="logo-placeholder">

            <img
                src="./images/Logo.svg"
                alt="logo"
            >

        </div>

        <div class="logo-text">

            <strong>
                AED STUDIOS
            </strong>

            <span>
                Creative Network
            </span>

        </div>

    </div>

    <div class="language-toggles">

        <button
            class="lang-btn"
            id="btn-nl"
        >
            NL
        </button>

        <button
            class="lang-btn active"
            id="btn-en"
        >
            EN
        </button>

        <button
            class="lang-btn"
            id="btn-fr"
        >
            FR
        </button>

    </div>

</header>

<main class="dates-page">

    <section class="top-section">

        <a
            href="event-overview.html"
            class="back-btn"
        >

            <span class="back-icon">
                ←
            </span>

            <span
                data-translate="goBack"
            ></span>

        </a>

    </section>

    <section class="title-section">

        <h1
            data-translate="chooseDate"
        ></h1>

        <p
            data-translate="chooseSubtitle"
        ></p>

    </section>

    <section
        class="dates-list"
        id="datesList"
    ></section>

    <section class="bottom-button">

        <button id="continueBtn">

            <span
                data-translate="continueBtn"
            ></span>

            <span>
                →
            </span>

        </button>

    </section>

</main>

<script>

    const translations = {

        en: {

            goBack:
                "Go back",

            chooseDate:
                "Choose a Date",

            chooseSubtitle:
                "Select the event that works best for you",

            continueBtn:
                "CONTINUE TO REGISTRATION"

        },

        nl: {

            goBack:
                "Ga terug",

            chooseDate:
                "Kies een Datum",

            chooseSubtitle:
                "Selecteer het event dat het beste bij je past",

            continueBtn:
                "GA VERDER NAAR REGISTRATIE"

        },

        fr: {

            goBack:
                "Retour",

            chooseDate:
                "Choisissez une Date",

            chooseSubtitle:
                "Sélectionnez l'événement qui vous convient le mieux",

            continueBtn:
                "CONTINUER VERS L'INSCRIPTION"

        }

    };

    function setLanguage(language){

        localStorage.setItem(
            "language",
            language
        );

        document
        .querySelectorAll(".lang-btn")
        .forEach(btn => {

            btn.classList.remove(
                "active"
            );

        });

        document
        .getElementById(
            `btn-${language}`
        )
        .classList.add(
            "active"
        );

        document
        .querySelectorAll(
            "[data-translate]"
        )
        .forEach(element => {

            const key =
                element.dataset.translate;

            element.textContent =
                translations[
                    language
                ][key];

        });

    }

    document
    .getElementById("btn-nl")
    .addEventListener(
        "click",
        () => {

            setLanguage("nl");

        }
    );

    document
    .getElementById("btn-en")
    .addEventListener(
        "click",
        () => {

            setLanguage("en");

        }
    );

    document
    .getElementById("btn-fr")
    .addEventListener(
        "click",
        () => {

            setLanguage("fr");

        }
    );

    const savedLanguage =

        localStorage.getItem(
            "language"
        )

        || "en";

    setLanguage(savedLanguage);

</script>
</body>
</html>
