<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,
        initial-scale=1.0"
    >

    <title>
        Event Dates
    </title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

    </style>

</head>

<body>

<header class="main-header">

    <div class="logo-area">

        <div class="logo-placeholder">

            <img
                src="./images/Logo.svg"
                alt="logo"
            >

        </div>

        <div class="logo-text">

            <strong>
                AED STUDIOS
            </strong>

            <span>
                Creative Network
            </span>

        </div>

    </div>

    <div class="language-toggles">

        <button
            class="lang-btn"
            id="btn-nl"
        >
            NL
        </button>

        <button
            class="lang-btn active"
            id="btn-en"
        >
            EN
        </button>

        <button
            class="lang-btn"
            id="btn-fr"
        >
            FR
        </button>

    </div>

</header>

<main class="dates-page">

    <section class="top-section">

        <a
            href="event-overview.html"
            class="back-btn"
        >

            <span class="back-icon">
                ←
            </span>

            <span
                data-translate="goBack"
            ></span>

        </a>

    </section>

    <section class="title-section">

        <h1
            data-translate="chooseDate"
        ></h1>

        <p
            data-translate="chooseSubtitle"
        ></p>

    </section>

    <section
        class="dates-list"
        id="datesList"
    ></section>

    <section class="bottom-button">

        <button id="continueBtn">

            <span
                data-translate="continueBtn"
            ></span>

            <span>
                →
            </span>

        </button>

    </section>

</main>

</body>
</html>
