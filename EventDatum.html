<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Event Dates
    </title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

    </style>

</head>

<body>

<header class="main-header">

    <div class="logo-area">

        <div class="logo-placeholder">

            <img
                src="./images/Logo.svg"
                alt="AED Studios logo"
            >

        </div>

        <div class="logo-text">

            <strong>
                AED STUDIOS
            </strong>

            <span>
                Creative Network
            </span>

        </div>

    </div>

    <div class="language-toggles">

        <button
            class="lang-btn"
            id="btn-nl"
            type="button"
        >
            NL
        </button>

        <button
            class="lang-btn active"
            id="btn-en"
            type="button"
        >
            EN
        </button>

        <button
            class="lang-btn"
            id="btn-fr"
            type="button"
        >
            FR
        </button>

    </div>

</header>

<main class="dates-page">

    <section class="top-section">

        <a
            href="event-overview.html"
            class="back-btn"
        >

            <span class="back-icon">
                ←
            </span>

            <span data-translate="goBack"></span>

        </a>

    </section>

    <section class="title-section">

        <h1 data-translate="chooseDate"></h1>

        <p data-translate="chooseSubtitle"></p>

    </section>

    <section
        class="dates-list"
        id="datesList"
    ></section>

    <section class="bottom-button">

        <button
            id="continueBtn"
            type="button"
        >

            <span data-translate="continueBtn"></span>

            <span>
                →
            </span>

        </button>

    </section>

</main>

<script>

    const translations = {

        en: {

            goBack:
                "Go back",

            chooseDate:
                "Choose a Date",

            chooseSubtitle:
                "Select the event that works best for you",

            continueBtn:
                "CONTINUE TO REGISTRATION",

            spotsAvailable:
                "spots available"

        },

        nl: {

            goBack:
                "Ga terug",

            chooseDate:
                "Kies een Datum",

            chooseSubtitle:
                "Selecteer het event dat het beste bij je past",

            continueBtn:
                "GA VERDER NAAR REGISTRATIE",

            spotsAvailable:
                "plaatsen beschikbaar"

        },

        fr: {

            goBack:
                "Retour",

            chooseDate:
                "Choisissez une Date",

            chooseSubtitle:
                "Sélectionnez l'événement qui vous convient le mieux",

            continueBtn:
                "CONTINUER VERS L'INSCRIPTION",

            spotsAvailable:
                "places disponibles"

        }

    };

    const eventDates = [

        {
            id: 1,
            date: "June 15, 2026",
            time: "18:00 - 22:00",
            location: "Studio 1",
            maxSpots: 60,
            registrations: 0
        },

        {
            id: 2,
            date: "September 22, 2026",
            time: "18:00 - 22:00",
            location: "Studio 1",
            maxSpots: 60,
            registrations: 0
        },

        {
            id: 3,
            date: "December 20, 2026",
            time: "18:00 - 22:00",
            location: "Studio 1",
            maxSpots: 60,
            registrations: 0
        },

        {
            id: 4,
            date: "March 19, 2027",
            time: "18:00 - 22:00",
            location: "Studio 1",
            maxSpots: 60,
            registrations: 0
        }

    ];

    const datesList =
        document.getElementById(
            "datesList"
        );

    function buildCards(language) {

        datesList.innerHTML = "";

        eventDates.forEach(event => {

            const availableSpots =
                event.maxSpots -
                event.registrations;

            const progress =
                (event.registrations /
                event.maxSpots) * 100;

            datesList.innerHTML += `

                <div class="date-card" data-id="${event.id}">

                    <div class="date-row">

                        <div class="date-icon">
                            <img
                                src="./images/EventRed.svg"
                                alt=""
                            >
                        </div>

                        <div class="date-title">
                            ${event.date}
                        </div>

                    </div>

                    <div class="date-row">

                        <div class="date-icon">
                            <img
                                src="./images/ClockRed.svg"
                                alt=""
                            >
                        </div>

                        <div class="date-info">
                            ${event.time}
                        </div>

                    </div>

                    <div class="date-row">

                        <div class="date-icon">
                            <img
                                src="./images/LocationRed.svg"
                                alt=""
                            >
                        </div>

                        <div class="date-info">
                            ${event.location}
                        </div>

                    </div>

                    <div class="spots">

                        <img
                            src="./images/PeopleRed.svg"
                            alt=""
                        >

                        <span>
                            ${availableSpots}
                            ${translations[language].spotsAvailable}
                        </span>

                    </div>

                    <div class="progress-bar">

                        <div
                            class="progress-fill"
                            style="width: ${progress}%"
                        ></div>

                    </div>

                </div>

            `;

        });

    }

    function setLanguage(language) {

        localStorage.setItem(
            "language",
            language
        );

        document
            .querySelectorAll(".lang-btn")
            .forEach(btn => {

                btn.classList.remove(
                    "active"
                );

            });

        document
            .getElementById(
                `btn-${language}`
            )
            .classList.add(
                "active"
            );

        document
            .querySelectorAll(
                "[data-translate]"
            )
            .forEach(element => {

                const key =
                    element.dataset.translate;

                element.textContent =
                    translations[language][key];

            });

        buildCards(language);

    }

    document
        .getElementById("btn-nl")
        .addEventListener(
            "click",
            () => {

                setLanguage("nl");

            }
        );

    document
        .getElementById("btn-en")
        .addEventListener(
            "click",
            () => {

                setLanguage("en");

            }
        );

    document
        .getElementById("btn-fr")
        .addEventListener(
            "click",
            () => {

                setLanguage("fr");

            }
        );

    const savedLanguage =
        localStorage.getItem(
            "language"
        ) || "en";

    setLanguage(savedLanguage);

</script>

</body>
</html>
