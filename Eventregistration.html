<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventregistration</title>
    <link rel="stylesheet" href="style.css" />

    <style></style>
  </head>
  <body>
    <header class="main-header">
      <div class="logo-area">
        <div class="logo-placeholder">
          <img src="./images/Logo.svg" alt="logo" />
        </div>

        <div class="logo-text">
          <strong>AED STUDIOS</strong>

          <span>Creative Network</span>
        </div>
      </div>

      <div class="language-toggles">
        <button class="lang-btn" id="btn-nl">NL</button>

        <button class="lang-btn active" id="btn-en">EN</button>

        <button class="lang-btn" id="btn-fr">FR</button>
      </div>
    </header>

    <main class="registration-page">
      <section class="top-section">
        <a href="EventDatum.html" class="back-btn">
          <div class="back-icon">←</div>

          <span data-translate="goBack"></span>
        </a>
      </section>

      <section class="title-section">
        <h1 data-translate="registrationTitle"></h1>

        <p data-translate="registrationSubtitle"></p>
      </section>

      <section class="form-section">
        <div class="form-group">
          <label>
            <img src="./images/Personred.svg" />

            <span data-translate="yourName"></span>
          </label>

          <input
            type="text"
            id="nameInput"
            data-placeholder="yourNamePlaceholder"
          />
        </div>

        <div class="form-group">
          <label>
            <img src="./images/Companiered.svg" />

            <span data-translate="workPlace"></span>
          </label>

          <input
            type="text"
            id="companyInput"
            data-placeholder="workPlacePlaceholder"
          />
        </div>

        <div class="form-group">
          <label>
            <img src="./images/Companiered.svg" />

            <span data-translate="email"></span>
          </label>

          <input
            type="email"
            id="emailInput"
            data-placeholder="emailPlaceholder"
          />
        </div>

        <div class="form-group">
            <label>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g clip-path="url(#peopleRedRegistrationClip)">
                  <path d="M10.663 13.9952V12.6623C10.663 11.9553 10.3821 11.2773 9.88222 10.7774C9.3823 10.2774 8.70425 9.99658 7.99725 9.99658H3.99863C3.29163 9.99658 2.61359 10.2774 2.11366 10.7774C1.61374 11.2773 1.33289 11.9553 1.33289 12.6623V13.9952" stroke="#FE0D00" stroke-width="1.33287" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M5.9979 7.33101C7.47015 7.33101 8.66365 6.13751 8.66365 4.66526C8.66365 3.19301 7.47015 1.99951 5.9979 1.99951C4.52565 1.99951 3.33215 3.19301 3.33215 4.66526C3.33215 6.13751 4.52565 7.33101 5.9979 7.33101Z" stroke="#FE0D00" stroke-width="1.33287" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M14.6617 13.995V12.6621C14.6612 12.0715 14.4646 11.4977 14.1028 11.0309C13.7409 10.5641 13.2342 10.2307 12.6624 10.083" stroke="#FE0D00" stroke-width="1.33287" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M10.663 2.08594C11.2364 2.23275 11.7446 2.56624 12.1076 3.03382C12.4705 3.5014 12.6675 4.07647 12.6675 4.66838C12.6675 5.26029 12.4705 5.83536 12.1076 6.30294C11.7446 6.77052 11.2364 7.10401 10.663 7.25082" stroke="#FE0D00" stroke-width="1.33287" stroke-linecap="round" stroke-linejoin="round"/>
                </g>
                <defs>
                  <clipPath id="peopleRedRegistrationClip">
                    <rect width="15.9945" height="15.9945" fill="white"/>
                  </clipPath>
                </defs>
              </svg>
          
              <span data-translate="meetPeople"></span>
            </label>
          
            <p class="roles-subtitle" data-translate="rolesSubtitle"></p>
          
            <div class="roles-grid" id="rolesGrid"></div>
          </div>
      </section>

      <section class="bottom-button">
        <button id="confirmBtn" data-translate="confirmBtn"></button>
      </section>
    </main>

function setLanguage(language){

    localStorage.setItem(
        "language",
        language
    );

    document
    .querySelectorAll(".lang-btn")
    .forEach(btn => {

        btn.classList.remove("active");

    });

    document
    .getElementById(`btn-${language}`)
    .classList.add("active");

    document
    .querySelectorAll("[data-translate]")
    .forEach(element => {

        const key =
            element.dataset.translate;

        element.textContent =
            translations[language][key];

    });

    document
    .querySelectorAll("[data-placeholder]")
    .forEach(element => {

        const key =
            element.dataset.placeholder;

        element.placeholder =
            translations[language][key];

    });

}
