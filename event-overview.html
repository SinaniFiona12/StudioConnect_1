<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AED Studios - Events</title>

    <link rel="stylesheet" href="/style.css" />
  </head>

  <body>
    <header class="main-header">
      <div class="logo-area">
        <div class="logo-placeholder">
          <img src="./images/Logo.svg" alt="logo" />
        </div>

        <div class="logo-text">
          <strong>AED STUDIOS</strong>
          <span>Creative Network</span>
        </div>
      </div>

      <div class="language-toggles">
        <button class="lang-btn" id="btn-nl">NL</button>

        <button class="lang-btn active" id="btn-en">EN</button>

        <button class="lang-btn" id="btn-fr">FR</button>
      </div>
    </header>
    <script>
      const access = sessionStorage.getItem("eventAccess");

      if (access !== "granted") {
        window.location.href = "EventCode.html";
      }
    </script>
  </body>
</html>
