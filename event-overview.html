<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AED Studios - Events</title>

    <link rel="stylesheet" href="/style.css" />
  </head>

  <body>
    <header class="main-header">
      <div class="logo-area">
        <div class="logo-placeholder">
          <img src="./images/Logo.svg" alt="logo" />
        </div>

        <div class="logo-text">
          <strong>AED STUDIOS</strong>
          <span>Creative Network</span>
        </div>
      </div>

      <div class="language-toggles">
        <button class="lang-btn" id="btn-nl">NL</button>

        <button class="lang-btn active" id="btn-en">EN</button>

        <button class="lang-btn" id="btn-fr">FR</button>
      </div>
    </header>
    <main class="event-page">
      <section class="event-hero">
        <div class="hero-content">
          <div class="hero-icon">
            <img src="./images/EventIconfull.svg" alt="Event" />
          </div>

          <h1 data-translate="heroTitle"></h1>

          <p data-translate="heroSubtitle"></p>
        </div>
      </section>
      <section class="info-section">
        <div class="info-card">
          <div class="info-icon">
            <img src="./images/Stars.svg" alt="Info" />
          </div>

          <p data-translate="infoText"></p>
        </div>
      </section>
      <section class="expect-section">
        <h2 data-translate="expectTitle"></h2>

        <div class="expect-card">
          <div class="expect-icon">
            <svg
              width="20"
              height="20"
              viewBox="0 0 20 20"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M13.3302 17.4959V15.8296C13.3302 14.9458 12.9791 14.0981 12.3541 13.4732C11.7291 12.8482 10.8815 12.4971 9.99763 12.4971H4.99881C4.11496 12.4971 3.26731 12.8482 2.64234 13.4732C2.01737 14.0981 1.66626 14.9458 1.66626 15.8296V17.4959"
                stroke="#FE0D00"
                stroke-width="1.66627"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M7.49826 9.16461C9.33877 9.16461 10.8308 7.67257 10.8308 5.83206C10.8308 3.99154 9.33877 2.49951 7.49826 2.49951C5.65774 2.49951 4.16571 3.99154 4.16571 5.83206C4.16571 7.67257 5.65774 9.16461 7.49826 9.16461Z"
                stroke="#FE0D00"
                stroke-width="1.66627"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M18.329 17.496V15.8297C18.3284 15.0913 18.0827 14.374 17.6303 13.7905C17.1779 13.2069 16.5445 12.7901 15.8296 12.6055"
                stroke="#FE0D00"
                stroke-width="1.66627"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M13.3302 2.60791C14.047 2.79145 14.6824 3.20835 15.1361 3.79289C15.5899 4.37743 15.8361 5.09635 15.8361 5.83632C15.8361 6.57628 15.5899 7.2952 15.1361 7.87974C14.6824 8.46428 14.047 8.88118 13.3302 9.06472"
                stroke="#FE0D00"
                stroke-width="1.66627"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>

          <p data-translate="expect1"></p>
        </div>

        <div class="expect-card">
          <div class="expect-icon">
            <img src="./images/StarIconred.svg" alt="Knowledge" />
          </div>

          <p data-translate="expect2"></p>
        </div>

        <div class="expect-card">
          <div class="expect-icon">
            <img src="./images/Calenderred.svg" alt="Projects" />
          </div>

          <p data-translate="expect3"></p>
        </div>
      </section>
      <section class="button-section">
        <a href="EventDatum.html" class="event-button">
          <span data-translate="buttonText"></span>

          <span>→</span>
        </a>
      </section>
      <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
          <div class="nav-icon">
            <img src="./images/HomeIcon.svg" alt="Home" />
          </div>

          <span data-translate="navHome"></span>
        </a>

        <a href="map.html" class="nav-item">
          <div class="nav-icon">
            <img src="./images/MapIcontrans.svg" alt="Map" />
          </div>

          <span data-translate="navMap"></span>
        </a>

        <a href="overview.html" class="nav-item">
          <div class="nav-icon">
            <img src="./images/StudioIcontrans.svg" alt="Studio's" />
          </div>

          <span data-translate="navStudios"></span>
        </a>

        <a href="event-overview.html" class="nav-item active">
          <div class="nav-icon">
            <img src="./images/EventIconfull.svg" alt="Event" />
          </div>

          <span data-translate="navEvent"></span>
        </a>
      </nav>
    </main>
    <script>
      const access = localStorage.getItem("eventAccess");

      if (access !== "granted") {
        window.location.href = "EventCode.html";
      }

      const translations = {
        en: {
          heroTitle: "2026 Networking Events",

          heroSubtitle: "Connect with creatives across all AED Studios",

          infoText:
            "Every quarter we're hosting an exclusive networking event bringing together professionals from all studios. A unique opportunity to make new connections, share knowledge, and collaborate on future projects.",

          expectTitle: "What to Expect",

          expect1:
            "Networking opportunities with producers, developers, designers and more",

          expect2:
            "Knowledge sharing about new technologies and creative processes",

          expect3: "Opportunities for future collaboration and projects",

          buttonText: "VIEW AVAILABLE DATES",

          navHome: "Home",

          navMap: "Map",

          navStudios: "Studios",

          navEvent: "Event",
        },

        nl: {
          heroTitle: "2026 Networking Events",

          heroSubtitle:
            "Connecteer met creatives verspreid over alle AED Studios",

          infoText:
            "Elk kwartaal organiseren we een exclusief networking event dat professionals uit alle studio’s samenbrengt. Een unieke kans om nieuwe connecties te maken, kennis te delen en samen te werken aan toekomstige projecten.",

          expectTitle: "Wat Kan Je Verwachten",

          expect1:
            "Netwerkmogelijkheden met producers, developers, designers en meer",

          expect2:
            "Kennisdeling over nieuwe technologieën en creatieve processen",

          expect3: "Kansen voor toekomstige samenwerkingen en projecten",

          buttonText: "BEKIJK BESCHIKBARE DATA",

          navHome: "Home",

          navMap: "Kaart",

          navStudios: "Studio's",

          navEvent: "Event",
        },

        fr: {
          heroTitle: "Événements Networking 2026",

          heroSubtitle:
            "Connectez-vous avec les créatifs de tous les AED Studios",

          infoText:
            "Chaque trimestre, nous organisons un événement de networking exclusif réunissant des professionnels de tous les studios. Une opportunité unique de créer de nouvelles connexions, partager des connaissances et collaborer sur de futurs projets.",

          expectTitle: "À Quoi S'attendre",

          expect1:
            "Opportunités de networking avec des producteurs, développeurs, designers et plus encore",

          expect2:
            "Partage de connaissances sur les nouvelles technologies et les processus créatifs",

          expect3: "Opportunités de collaborations et projets futurs",

          buttonText: "VOIR LES DATES DISPONIBLES",

          navHome: "Accueil",

          navMap: "Carte",

          navStudios: "Studios",

          navEvent: "Événement",
        },
      };

      function setLanguage(language) {
        localStorage.setItem("language", language);

        document.querySelectorAll(".lang-btn").forEach((btn) => {
          btn.classList.remove("active");
        });

        document.getElementById(`btn-${language}`).classList.add("active");

        document.querySelectorAll("[data-translate]").forEach((element) => {
          const key = element.dataset.translate;

          element.textContent = translations[language][key];
        });
      }

      document.getElementById("btn-nl").addEventListener("click", () => {
        setLanguage("nl");
      });

      document.getElementById("btn-en").addEventListener("click", () => {
        setLanguage("en");
      });

      document.getElementById("btn-fr").addEventListener("click", () => {
        setLanguage("fr");
      });

      const savedLanguage = localStorage.getItem("language") || "en";

      setLanguage(savedLanguage);
    </script>
  </body>
</html>
