<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AED Studios - The Orangerie</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="main-header">
    <div class="logo-area">
      <div class="logo-placeholder">
        <img src="/images/Logo.svg" alt="logo" />
      </div>

      <div class="logo-text">
        <strong>AED STUDIOS</strong>
        <span>Creative Network</span>
      </div>
    </div>

    <div class="language-toggles">
      <button class="lang-btn" data-lang="nl">NL</button>
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="fr">FR</button>
    </div>
  </header>

  <nav class="sub-nav">
    <button class="back-btn" id="backButton">
      <img src="/images/Button.svg" alt="Terug" />
    </button>

    <h2 id="page-title">Loading...</h2>
  </nav>

  <main>
    <section class="hero">
      <img
        id="hero-image"
        class="hero-bg"
        src=""
        alt="Hero Afbeelding"
      />

      <div class="hero-content">
        <div class="hero-icon">
          <img
            src="/images/studio-icon.svg"
            alt="type icon"
          />
        </div>

        <h1 id="studio-title">Loading...</h1>
      </div>
    </section>

    <section class="info-section">
      <h3 class="section-title" id="about-title">
        ABOUT STUDIO
      </h3>

      <div class="card">
        <p id="studio-description">
          Informatie wordt geladen...
        </p>
      </div>
    </section>

    <section
      class="info-section"
      id="references-section"
      hidden
    >
      <h3 class="section-title" id="references-title">
        REFERENCES
      </h3>

      <div
        class="references-scroll"
        id="references-container"
      ></div>
    </section>

    <section class="info-section">
      <h3 class="section-title" id="gallery-title">
        GALLERY
      </h3>

      <div
        class="gallery-grid"
        id="gallery-container"
      ></div>
    </section>

    <section class="info-section">
      <div id="contacts-container"></div>
    </section>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <div class="nav-icon">
          <img
            src="/images/HomeIcon.svg"
            alt="Home"
          />
        </div>

        <span id="nav-home">Home</span>
      </a>

      <a href="map.html" class="nav-item">
        <div class="nav-icon">
          <img
            src="/images/MapIcontrans.svg"
            alt="Map"
          />
        </div>

        <span id="nav-map">Map</span>
      </a>

      <a href="overview.html" class="nav-item">
        <div class="nav-icon">
          <img
            src="/images/StudioIcontrans.svg"
            alt="Studio's"
          />
        </div>

        <span id="nav-studios">Studio's</span>
      </a>

      <a
        href="eventCode.html"
        id="eventNavBtn"
        class="nav-item"
      >
        <div class="nav-icon">
          <img
            src="/images/EventIcontrans.svg"
            alt="Event"
          />
        </div>

        <span id="nav-event">Event</span>
      </a>
    </nav>
  </main>

  <script type="module">
    import { supabase } from "./src/supabase.js";
  
    // --- 1. TRANSLATIONS ---
  
    const translations = {
      nl: {
        about: "OVER STUDIO",
        references: "REFERENTIES",
        gallery: "GALERIJ",
        navHome: "Home",
        navMap: "Kaart",
        navStudios: "Studio's",
        navEvent: "Event",
        loading: "Laden...",
        loadingInfo: "Informatie wordt geladen...",
        emailLabel: "E-mail",
        contactBtn: "Contacteer",
      },
  
      en: {
        about: "ABOUT STUDIO",
        references: "REFERENCES",
        gallery: "GALLERY",
        navHome: "Home",
        navMap: "Map",
        navStudios: "Studios",
        navEvent: "Event",
        loading: "Loading...",
        loadingInfo: "Information is loading...",
        emailLabel: "Email",
        contactBtn: "Contact",
      },
  
      fr: {
        about: "À PROPOS DU STUDIO",
        references: "RÉFÉRENCES",
        gallery: "GALERIE",
        navHome: "Accueil",
        navMap: "Carte",
        navStudios: "Studios",
        navEvent: "Événement",
        loading: "Chargement...",
        loadingInfo: "Chargement des informations...",
        emailLabel: "E-mail",
        contactBtn: "Contacter",
      },
    };
  
    function setText(id, text) {
      const element = document.getElementById(id);
  
      if (element) {
        element.textContent = text;
      }
    }
  
    function setLanguage(lang) {
      const t = translations[lang];
  
      setText("about-title", t.about);
      setText("references-title", t.references);
      setText("gallery-title", t.gallery);
  
      setText("nav-home", t.navHome);
      setText("nav-map", t.navMap);
      setText("nav-studios", t.navStudios);
      setText("nav-event", t.navEvent);
  
      const pageTitle = document.getElementById("page-title");
  
      if (
        pageTitle &&
        (
          pageTitle.textContent === "Loading..." ||
          pageTitle.textContent === "Laden..." ||
          pageTitle.textContent === "Chargement..."
        )
      ) {
        setText("page-title", t.loading);
        setText("studio-title", t.loading);
        setText("studio-description", t.loadingInfo);
      }
  
      document.querySelectorAll(".contact-label").forEach((el) => {
        el.textContent = t.emailLabel;
      });
  
      document.querySelectorAll(".cta-contact-text").forEach((el) => {
        el.textContent = t.contactBtn;
      });
  
      document.querySelectorAll(".lang-btn").forEach((button) => {
        button.classList.toggle(
          "active",
          button.dataset.lang === lang
        );
      });
  
      localStorage.setItem("language", lang);
    }
  
    document.querySelectorAll(".lang-btn").forEach((button) => {
      button.addEventListener("click", () => {
        setLanguage(button.dataset.lang);
      });
    });
  
    // --- 2. SUPABASE STORAGE ---
  
    function getImageUrl(path) {
      if (!path) return "";
  
      if (path.startsWith("http")) {
        return path;
      }
  
      const cleanPath = path.startsWith("/")
        ? path.slice(1)
        : path;
  
      const { data } = supabase
        .storage
        .from("images")
        .getPublicUrl(cleanPath);
  
      return data.publicUrl;
    }
  
    function getGalleryUrl(path) {
      if (!path) return "";
  
      if (path.startsWith("http")) {
        return path;
      }
  
      const cleanPath = path.startsWith("/")
        ? path.slice(1)
        : path;
  
      const { data } = supabase
        .storage
        .from("gallery")
        .getPublicUrl(cleanPath);
  
      return data.publicUrl;
    }
  
    function getReferenceImageUrl(path) {
      if (!path) return "";
  
      if (path.startsWith("http")) {
        return path;
      }
  
      const cleanPath = path.startsWith("/")
        ? path.slice(1)
        : path;
  
      const { data } = supabase
        .storage
        .from("references")
        .getPublicUrl(cleanPath);
  
      return data.publicUrl;
    }
  
    // --- 3. FETCH + RENDER ---
  
    async function fetchStudioDetails(studioId) {
      const { data: studio, error } = await supabase
        .from("studios")
        .select("*")
        .eq("id", studioId)
        .single();
  
      if (error) {
        console.error(
          "Error fetching studio details:",
          error
        );
  
        return null;
      }
  
      return studio;
    }
  
    async function renderStudioDetails() {
      const params = new URLSearchParams(
        window.location.search
      );
  
      const studioId = params.get("id");
  
      if (!studioId) return;
  
      const studio = await fetchStudioDetails(studioId);
  
      if (!studio) return;
  
      // TITLES + DESCRIPTION
  
      document.getElementById("page-title").textContent =
        studio.name;
  
      document.getElementById("studio-title").textContent =
        studio.name;
  
      document.getElementById(
        "studio-description"
      ).textContent = studio.description;
  
      // STUDIO LOGO / ICON
  
      const studioIcon = document.querySelector(".hero-icon img");
  
      if (studioIcon) {
        studioIcon.src = getImageUrl(studio.logo || "studio-icon.svg");
        studioIcon.alt = `${studio.name} icon`;
      }
  
      // HERO IMAGE
  
      if (studio.banner) {
        document.getElementById("hero-image").src =
          getImageUrl(studio.banner);
      }
  
      // REFERENCES
  
      const referencesSection =
        document.getElementById("references-section");
  
      const referencesContainer =
        document.getElementById("references-container");
  
      const references = studio.references || [];
  
      referencesContainer.innerHTML = "";
  
      referencesSection.hidden =
        references.length === 0;
  
      references.forEach((imageUrl) => {
        const imgElement =
          document.createElement("img");
  
        imgElement.src =
          getReferenceImageUrl(imageUrl);
  
        imgElement.alt = "Reference Image";
  
        imgElement.className = "reference-card";
  
        referencesContainer.appendChild(imgElement);
      });
  
      // GALLERY
  
      const galleryContainer =
        document.getElementById("gallery-container");
  
      galleryContainer.innerHTML = "";
  
      (studio.gallery || []).forEach((imageUrl) => {
        const imgElement =
          document.createElement("img");
  
        imgElement.src =
          getGalleryUrl(imageUrl);
  
        imgElement.alt = "Gallery Image";
  
        galleryContainer.appendChild(imgElement);
      });
  
      // CONTACTS
  
      const contactsContainer =
        document.getElementById("contacts-container");
  
      contactsContainer.innerHTML = "";
  
      (studio.contacts || []).forEach((contact) => {
        const card = document.createElement("div");
  
        card.className =
          "card contact-section-card";
  
        card.innerHTML = `
          <div
            class="contact-top"
            style="
              display: flex;
              align-items: center;
              gap: 15px;
              margin-bottom: 20px;
            "
          >
            <div
              class="contact-icon"
              style="
                background-color: #4A1A1A;
                width: 40px;
                height: 40px;
                border-radius: 10px;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-shrink: 0;
              "
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M16.6627 3.33301H3.33255C2.41229 3.33301 1.66628 4.07902 1.66628 4.99928V14.9969C1.66628 15.9172 2.41229 16.6632 3.33255 16.6632H16.6627C17.583 16.6632 18.329 15.9172 18.329 14.9969V4.99928C18.329 4.07902 17.583 3.33301 16.6627 3.33301Z"
                  stroke="#FE0D00"
                  stroke-width="1.66627"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
  
                <path
                  d="M18.329 5.83203L10.8558 10.5809C10.5986 10.7421 10.3012 10.8275 9.99764 10.8275C9.69412 10.8275 9.39673 10.7421 9.13951 10.5809L1.66628 5.83203"
                  stroke="#FE0D00"
                  stroke-width="1.66627"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
  
            <div class="contact-info">
              <span
                class="contact-label"
                style="
                  display: block;
                  font-size: 12px;
                  color: #888;
                "
              >
                Email
              </span>
  
              <span
                class="studio-email-text"
                style="
                  display: block;
                  font-size: 16px;
                  color: white;
                "
              >
                ${contact.email}
              </span>
            </div>
          </div>
  
          <a
            href="mailto:${contact.email}"
            class="cta-button-new"
          >
            <span class="cta-contact-text">
              Contact
            </span>
  
            ${contact.label}
  
            <svg
              width="17"
              height="20"
              viewBox="0 0 17 20"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M3.54169 10H13.4584"
                stroke="#FDFDFD"
                stroke-width="1.66627"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
  
              <path
                d="M8.5 4.1665L13.4583 9.99984L8.5 15.8332"
                stroke="#FDFDFD"
                stroke-width="1.66627"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </a>
        `;
  
        contactsContainer.appendChild(card);
      });
  
      setLanguage(
        localStorage.getItem("language") || "en"
      );
    }
  
    // --- 4. INITIALIZE PAGE ---
  
    setLanguage(
      localStorage.getItem("language") || "en"
    );
  
    renderStudioDetails();
  
    // BACK BUTTON
  
    const backButton =
      document.getElementById("backButton");
  
    backButton.addEventListener("click", () => {
      const urlParams = new URLSearchParams(
        window.location.search
      );
  
      window.location.href =
        urlParams.get("from") === "map"
          ? "map.html"
          : "overview.html";
    });
  </script>
</body>
</html>
