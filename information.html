<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AED Studios - The Orangerie</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header"></header>

    <div class="logo-area">
        <div class="logo-placeholder"><img src="./images/Logo.svg" alt="logo"></div>

        <div class="logo-text">
            <strong>AED STUDIOS</strong>
            <span>Creative Network</span>
        </div>
    </div>

    <div class="language-toggles">
        <button class="lang-btn">NL</button>
        <button class="lang-btn active">EN</button>
        <button class="lang-btn">FR</button>
    </div>

</header>

<nav class="sub-nav">
    <button class="back-btn" onclick="window.location.href='overview.html'"><img src="images/Button.svg" alt="Terug"></button>
    <h2 id="page-title">Loading...</h2>
</nav>
<main>
    <section class="hero">
        <img id="hero-image" class="hero-bg" src="" alt="Hero Afbeelding">
        <div class="hero-content">
            <div class="hero-icon"><img src="images/Container (3).svg" alt="Orangerie Icon"></div>
            <h1 id="studio-title">Loading...</h1>
        </div>
    </section>

    <section class="info-section">
        <h3 class="section-title">ABOUT STUDIO</h3>
        <div class="card">
            <p id="studio-description">Informatie wordt geladen...</p>
        </div>
    </section>

    <section class="info-section">
        <h3 class="section-title">CONTACT</h3>
        <div class="card contact-card">
            <div class="contact-icon"><img src="images/Icon.svg" alt="Email Icon"></div>
            <div class="contact-info">
                <span class="contact-label">Email</span>
                <a href="#" id="studio-email">Loading...</a>
            </div>
            <div class="arrow-right"><img src="images/Vector.svg" alt="Arrow Right"></div>
        </div>
    </section>

    <section class="info-section">
        <h3 class="section-title">GALLERY</h3>
        <div class="gallery-grid" id="gallery-container">
            </div>
    </section>

    <nav class="bottom-nav">

        <a href="index.html" class="nav-item">
            <div class="nav-icon">
                <img src="./images/HomeIcon.svg" alt="Home">
            </div>
            <span>Home</span>
        </a>
    
        <a href="map.html" class="nav-item">
            <div class="nav-icon">
                <img src="./images/MapIcontrans.svg" alt="Map">
            </div>
            <span>Map</span>
        </a>
    
        <a href="overview.html" class="nav-item">
            <div class="nav-icon">
                <img src="./images/StudioIcontrans.svg" alt="Studio's">
            </div>
            <span>Studio's</span>
        </a>
    
       <a href="#" id="eventNavBtn" class="nav-item">
            <div class="nav-icon">
                <img src="./images/EventIcontrans.svg" alt="Event">
            </div>
            <span>Event</span>
        </a>
    
    </nav>

</main>


<script>
    // 1. Mock Database
    const databaseData = {
        title: "The Orangerie",
        description: "The Orangerie is a unique 850 m² transparent event space, surrounded by nature and greenery. Flooded with natural light by day and transformed into an atmospheric venue by night, it offers a stylish setting enhanced with elegant chandeliers, subtle sound and lighting.",
        email: "Sales@aedstudios.com",
        // Hero image
        heroImage: "images/image 2 (1).svg", 
        galleryImages: [
            "images/orangeriefeest.svg",
            "images/orangeriemensen.svg",
            "images/orangerieglazen.svg",
            "images/orangerieplaats.svg"
        ]
    };

    // 2. Functie om de HTML te vullen met de data
    function buildPage(data) {
        // Tekst invullen
        document.getElementById('page-title').textContent = data.title;
        document.getElementById('studio-title').textContent = data.title;
        document.getElementById('studio-description').textContent = data.description;
        
        // Email invullen
        const emailLink = document.getElementById('studio-email');
        emailLink.textContent = data.email;
        emailLink.href = "mailto:" + data.email;

        // Hero image invullen
        document.getElementById('hero-image').src = data.heroImage;

        // Gallery opbouwen
        const galleryContainer = document.getElementById('gallery-container');
        galleryContainer.innerHTML = ''; 

        data.galleryImages.forEach(imageUrl => {
            const imgElement = document.createElement('img');
            imgElement.src = imageUrl;
            imgElement.alt = "Gallery Afbeelding";
            galleryContainer.appendChild(imgElement);
        });
    }

    // 3. Bouw de pagina op
    buildPage(databaseData);
</script>


</body>
</html>
