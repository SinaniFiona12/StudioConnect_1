<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AED Studios - The Orangerie</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-area">
            <div class="logo-placeholder">
                <img src="./images/Logo.svg" alt="logo">
            </div>
            <div class="logo-text">
                <strong>AED STUDIOS</strong>
                <span>Creative Network</span>
            </div>
        </div>
    
        <div class="language-toggles">
            <button class="lang-btn" data-lang="nl">NL</button>
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="fr">FR</button>
        </div>
    </header>

<nav class="sub-nav">
    <button class="back-btn" onclick="window.location.href='overview.html'"><img src="images/Button.svg" alt="Terug"></button>
    <h2 id="page-title">Loading...</h2>
</nav>

<main>
    <section class="hero">
        <img id="hero-image" class="hero-bg" src="" alt="Hero Afbeelding">
        <div class="hero-content">
            <div class="hero-icon"><img src="images/Container (3).svg" alt="Orangerie Icon"></div>
            <h1 id="studio-title">Loading...</h1>
        </div>
    </section>

    <section class="info-section">
        <h3 class="section-title" id="about-title">ABOUT STUDIO</h3>
        <div class="card">
            <p id="studio-description">Informatie wordt geladen...</p>
        </div>
    </section>

    <section class="info-section">
        <h3 class="section-title" id="contact-title">CONTACT</h3>
        <div class="card contact-card">
            <div class="contact-icon"><img src="images/Icon.svg" alt="Email Icon"></div>
            <div class="contact-info">
                <span class="contact-label" id="contact-label">Email</span>
                <a href="#" id="studio-email">Loading...</a>
            </div>
            <div class="arrow-right"><img src="images/Vector.svg" alt="Arrow Right"></div>
        </div>
    </section>

    <section class="info-section">
        <h3 class="section-title" id="gallery-title">GALLERY</h3>
        <div class="gallery-grid" id="gallery-container">
            </div>
    </section>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <div class="nav-icon">
                <img src="./images/HomeIcon.svg" alt="Home">
            </div>
            <span>Home</span>
        </a>
    
        <a href="map.html" class="nav-item">
            <div class="nav-icon">
                <img src="./images/MapIcontrans.svg" alt="Map">
            </div>
            <span>Map</span>
        </a>
    
        <a href="overview.html" class="nav-item">
            <div class="nav-icon">
                <img src="./images/StudioIcontrans.svg" alt="Studio's">
            </div>
            <span>Studio's</span>
        </a>
    
       <a href="#" id="eventNavBtn" class="nav-item">
            <div class="nav-icon">
                <img src="./images/EventIcontrans.svg" alt="Event">
            </div>
            <span>Event</span>
        </a>
    </nav>
</main>

<script>
    // 1. Vaste Data (Verandert niet bij taalwissel)
    const databaseData = {
        title: "The Orangerie",
        email: "Sales@aedstudios.com",
        heroImage: "images/image 2 (1).svg", 
        galleryImages: [
            "images/orangeriefeest.svg",
            "images/orangeriemensen.svg",
            "images/orangerieglazen.svg",
            "images/orangerieplaats.svg"
        ]
    };

    // 2. Woordenboek voor Vertalingen
    const translations = {
        en: {
            aboutTitle: "ABOUT STUDIO",
            contactTitle: "CONTACT",
            galleryTitle: "GALLERY",
            emailLabel: "Email",
            description: "The Orangerie is a unique 850 m² transparent event space, surrounded by nature and greenery. Flooded with natural light by day and transformed into an atmospheric venue by night, it offers a stylish setting enhanced with elegant chandeliers, subtle sound and lighting."
        },
        nl: {
            aboutTitle: "OVER DE STUDIO",
            contactTitle: "CONTACT",
            galleryTitle: "GALERIJ",
            emailLabel: "E-mail",
            description: "De Orangerie is een unieke, transparante evenementenruimte van 850 m², omgeven door natuur en groen. Overdag overspoeld met natuurlijk licht en 's avonds omgetoverd tot een sfeervolle locatie, biedt het een stijlvolle setting verrijkt met elegante kroonluchters, subtiel geluid en verlichting."
        },
        fr: {
            aboutTitle: "À PROPOS DU STUDIO",
            contactTitle: "CONTACT",
            galleryTitle: "GALERIE",
            emailLabel: "E-mail",
            description: "L'Orangerie est un espace événementiel transparent unique de 850 m², entouré de nature et de verdure. Inondé de lumière naturelle le jour et transformé en un lieu d'ambiance la nuit, il offre un cadre élégant rehaussé de lustres élégants, d'un son et d'un éclairage subtils."
        }
    };

    // Standaardtaal instellen
    let currentLanguage = 'en';

    // 3. Functie om de HTML te vullen met de data op basis van de taal
    function buildPage(lang) {
        const t = translations[lang];

        // Vaste Tekst invullen (verandert niet)
        document.getElementById('page-title').textContent = databaseData.title;
        document.getElementById('studio-title').textContent = databaseData.title;
        const emailLink = document.getElementById('studio-email');
        emailLink.textContent = databaseData.email;
        emailLink.href = "mailto:" + databaseData.email;
        document.getElementById('hero-image').src = databaseData.heroImage;

        // Vertaalde Tekst invullen
        document.getElementById('about-title').textContent = t.aboutTitle;
        document.getElementById('contact-title').textContent = t.contactTitle;
        document.getElementById('gallery-title').textContent = t.galleryTitle;
        document.getElementById('contact-label').textContent = t.emailLabel;
        document.getElementById('studio-description').textContent = t.description;

        // Gallery opbouwen (we maken hem alleen leeg en vol als hij nog leeg is)
        const galleryContainer = document.getElementById('gallery-container');
        if (galleryContainer.children.length === 0) {
            databaseData.galleryImages.forEach(imageUrl => {
                const imgElement = document.createElement('img');
                imgElement.src = imageUrl;
                imgElement.alt = "Gallery Afbeelding";
                galleryContainer.appendChild(imgElement);
            });
        }
    }

    // 4. Taal Knoppen Logica
    const languageButtons = document.querySelectorAll('.lang-btn');

    languageButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
            // Verwijder active class (rode kleur) van alle knoppen
            languageButtons.forEach(button => button.classList.remove('active'));
            
            // Voeg active class toe aan de geklikte knop
            const clickedBtn = e.target;
            clickedBtn.classList.add('active');

            // Update de taal en herlaad de pagina inhoud
            currentLanguage = clickedBtn.getAttribute('data-lang');
            buildPage(currentLanguage);
        });
    });

    // 5. Initialiseer de pagina
    buildPage(currentLanguage);

    // 6. Event Navigatie Logica (toegevoegd voor consistentie met de rest van je app)
    const eventNavBtn = document.getElementById("eventNavBtn");
    if(eventNavBtn) {
        eventNavBtn.addEventListener("click", (e) => {
            e.preventDefault();
            const access = sessionStorage.getItem("eventAccess");
            if(access === "granted"){
                window.location.href = "event-overview.html";
            } else {
                window.location.href = "EventCode.html";
            }
        });
    }
</script>

</body>
</html>
