<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AED Studios - The Orangerie</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="logo-area">
        <div class="logo-placeholder">
          <img src="/images/Logo.svg" alt="logo" />
        </div>
        <div class="logo-text">
          <strong>AED STUDIOS</strong>
          <span>Creative Network</span>
        </div>
      </div>

      <div class="language-toggles">
        <button class="lang-btn" data-lang="nl">NL</button>
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="fr">FR</button>
      </div>
    </header>

    <nav class="sub-nav">
      <button class="back-btn" id="backButton">
        <img src="/images/Button.svg" alt="Terug" />
      </button>
      <h2 id="page-title">Loading...</h2>
    </nav>

    <main>
      <section class="hero">
        <img
          id="hero-image"
          class="hero-bg"
          src=""
          alt="Hero Afbeelding"
        />
        <div class="hero-content">
          <div class="hero-icon" id="studio-icon"></div>
          <h1 id="studio-title">Loading...</h1>
        </div>
      </section>

      <section class="info-section">
        <h3 class="section-title" id="about-title">ABOUT STUDIO</h3>
        <div class="card">
          <p id="studio-description">Informatie wordt geladen...</p>
        </div>
      </section>

      <section class="info-section" id="references-section" hidden>
        <h3 class="section-title" id="references-title">REFERENCES</h3>
        <div class="references-scroll" id="references-container"></div>
      </section>

      <section class="info-section">
        <h3 class="section-title" id="gallery-title">GALLERY</h3>
        <div class="gallery-grid" id="gallery-container"></div>
      </section>

      <section class="info-section">
        <div id="contacts-container"></div>
      </section>

      <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
          <div class="nav-icon">
            <img src="/images/HomeIcon.svg" alt="Home" />
          </div>
          <span id="nav-home">Home</span>
        </a>

        <a href="map.html" class="nav-item">
          <div class="nav-icon">
            <img src="/images/MapIcontrans.svg" alt="Map" />
          </div>
          <span id="nav-map">Map</span>
        </a>

        <a href="overview.html" class="nav-item">
          <div class="nav-icon">
            <img src="/images/StudioIcontrans.svg" alt="Studio's" />
          </div>
          <span id="nav-studios">Studio's</span>
        </a>

        <a href="eventCode.html" id="eventNavBtn" class="nav-item">
          <div class="nav-icon">
            <img src="/images/EventIcontrans.svg" alt="Event" />
          </div>
          <span id="nav-event">Event</span>
        </a>
      </nav>
    </main>

    <script type="module">
      import { supabase } from "./src/supabase.js";

      // --- 1. EXPANDED TRANSLATIONS (All Texts) ---
      const translations = {
        nl: { 
          about: "OVER STUDIO", references: "REFERENTIES", gallery: "GALERIJ", 
          navHome: "Home", navMap: "Kaart", navStudios: "Studio's", navEvent: "Event",
          loading: "Laden...", loadingInfo: "Informatie wordt geladen...",
          emailLabel: "E-mail", contactBtn: "Contacteer"
        },
        en: { 
          about: "ABOUT STUDIO", references: "REFERENCES", gallery: "GALLERY", 
          navHome: "Home", navMap: "Map", navStudios: "Studios", navEvent: "Event",
          loading: "Loading...", loadingInfo: "Information is loading...",
          emailLabel: "Email", contactBtn: "Contact"
        },
        fr: { 
          about: "À PROPOS DU STUDIO", references: "RÉFÉRENCES", gallery: "GALERIE", 
          navHome: "Accueil", navMap: "Carte", navStudios: "Studios", navEvent: "Événement",
          loading: "Chargement...", loadingInfo: "Chargement des informations...",
          emailLabel: "E-mail", contactBtn: "Contacter"
        },
      };

      // Helper function for translating text
      function setText(id, text) {
        const element = document.getElementById(id);
        if (element) element.textContent = text;
      }

      // Master function to set all language across the page
      function setLanguage(lang) {
        const t = translations[lang];

        // Translate fixed section titles
        setText("about-title", t.about);
        setText("references-title", t.references);
        setText("gallery-title", t.gallery);
        setText("nav-home", t.navHome);
        setText("nav-map", t.navMap);
        setText("nav-studios", t.navStudios);
        setText("nav-event", t.navEvent);

        // Translate loading states (if studio data hasn't loaded yet)
        const pageTitle = document.getElementById("page-title");
        if (pageTitle && (pageTitle.textContent === "Loading..." || pageTitle.textContent === "Laden..." || pageTitle.textContent === "Chargement...")) {
          setText("page-title", t.loading);
          setText("studio-title", t.loading);
          setText("studio-description", t.loadingInfo);
        }

        // Translate dynamic contact cards if they exist
        document.querySelectorAll(".contact-label").forEach(el => el.textContent = t.emailLabel);
        document.querySelectorAll(".cta-contact-text").forEach(el => el.textContent = t.contactBtn);

        // Update button active states
        document.querySelectorAll(".lang-btn").forEach((button) => {
          button.classList.toggle("active", button.dataset.lang === lang);
        });

        localStorage.setItem("language", lang);
      }

      // Hook up the language buttons
      document.querySelectorAll(".lang-btn").forEach((button) => {
        button.addEventListener("click", () => setLanguage(button.dataset.lang));
      });

      // --- 2. THE FRIEND'S AI FIX: SUPABASE STORAGE BUCKETS ---
      
      function getBannerUrl(path) {
        if (!path) return "";
        if (path.startsWith("http")) return path;
        const cleanPath = path.startsWith("/") ? path.slice(1) : path;
        const { data } = supabase.storage.from("images").getPublicUrl(cleanPath);
        return data.publicUrl;
      }

      function getGalleryUrl(path) {
        if (!path) return "";
        if (path.startsWith("http")) return path;
        const cleanPath = path.startsWith("/") ? path.slice(1) : path;
        const { data } = supabase.storage.from("gallery").getPublicUrl(cleanPath);
        return data.publicUrl;
      }

      function getReferenceImageUrl(path) {
        if (!path) return "";
        if (path.startsWith("http")) return path;
        const cleanPath = path.startsWith("/") ? path.slice(1) : path;
        const { data } = supabase.storage.from("references").getPublicUrl(cleanPath);
        return data.publicUrl;
      }

      // --- 3. FETCH AND RENDER LOGIC ---

      async function fetchStudioDetails(studioId) {
        const { data: studio, error } = await supabase.from("studios").select("*").eq("id", studioId).single();
        if (error) { console.error("Error fetching studio details:", error); return null; }
        return studio;
      }

      async function renderStudioDetails() {
        const params = new URLSearchParams(window.location.search);
        const studioId = params.get("id");
        if (!studioId) return;

        const studio = await fetchStudioDetails(studioId);
        if (!studio) return;

        // Set database texts
        document.getElementById("page-title").textContent = studio.name;
        document.getElementById("studio-title").textContent = studio.name;
        document.getElementById("studio-description").textContent = studio.description;

        // Banner Image
        if (studio.banner) {
          document.getElementById("hero-image").src = getBannerUrl(studio.banner);
        }

        // Studio Icon
const studioIcon = document.getElementById("studio-icon");

if (studio.name.toLowerCase() === "the orangerie") {
  studioIcon.outerHTML = `
    <div class="hero-icon" id="studio-icon">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 24C0 10.7452 10.7452 0 24 0H48C61.2548 0 72 10.7452 72 24V48C72 61.2548 61.2548 72 48 72H24C10.7452 72 0 61.2548 0 48V24Z" fill="#FE0D00"/>
        <path d="M29.0583 27.5002H42.9417C42.7333 26.4725 42.2976 25.5044 41.6667 24.6668H30.3333C29.7024 25.5044 29.2667 26.4725 29.0583 27.5002ZM42.9417 30.3335H29.0583C29.3863 31.9324 30.2561 33.3691 31.5209 34.4008C32.7856 35.4325 34.3678 35.9959 36 35.9959C37.6322 35.9959 39.2143 35.4325 40.4791 34.4008C41.7439 33.3691 42.6137 31.9324 42.9417 30.3335ZM34.5833 47.3335V38.7343C32.7533 38.4696 31.0338 37.6986 29.6187 36.5084C28.2037 35.3182 27.1495 33.7561 26.5751 31.9986C26.0006 30.241 25.9289 28.3579 26.368 26.5617C26.807 24.7656 27.7393 23.1279 29.0597 21.8335L42.9402 21.8335C44.2606 23.1279 45.193 24.7656 45.632 26.5617C46.0711 28.3579 45.9993 30.241 45.4249 31.9986C44.8505 33.7561 43.7963 35.3182 42.3812 36.5084C40.9662 37.6986 39.2466 38.4696 37.4167 38.7343V47.3335H40.25C40.6257 47.3335 40.986 47.4828 41.2517 47.7484C41.5174 48.0141 41.6667 48.3744 41.6667 48.7502C41.6667 49.1259 41.5174 49.4862 41.2517 49.7519C40.986 50.0176 40.6257 50.1668 40.25 50.1668H31.75C31.3743 50.1668 31.0139 50.0176 30.7483 49.7519C30.4826 49.4862 30.3333 49.1259 30.3333 48.7502C30.3333 48.3744 30.4826 48.0141 30.7483 47.7484C31.0139 47.4828 31.3743 47.3335 31.75 47.3335H34.5833Z" fill="white"/>
      </svg>
    </div>
  `;
} else {
  studioIcon.outerHTML = `
    <div class="hero-icon" id="studio-icon">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 24C0 10.7452 10.7452 0 24 0H48C61.2548 0 72 10.7452 72 24V48C72 61.2548 61.2548 72 48 72H24C10.7452 72 0 61.2548 0 48V24Z" fill="#FE0D00"/>
        <path d="M22 22H50V50H22V22Z" fill="white"/>
      </svg>
    </div>
  `;
}

        // References 
        const referencesSection = document.getElementById("references-section");
        const referencesContainer = document.getElementById("references-container");
        const references = studio.references || [];
        referencesContainer.innerHTML = "";
        referencesSection.hidden = references.length === 0;

        references.forEach((imageUrl) => {
          const imgElement = document.createElement("img");
          imgElement.src = getReferenceImageUrl(imageUrl);
          imgElement.alt = "Reference Image";
          imgElement.className = "reference-card";
          referencesContainer.appendChild(imgElement);
        });

        // Gallery
        const galleryContainer = document.getElementById("gallery-container");
        galleryContainer.innerHTML = "";
        (studio.gallery || []).forEach((imageUrl) => {
          const imgElement = document.createElement("img");
          imgElement.src = getGalleryUrl(imageUrl);
          imgElement.alt = "Gallery Image";
          galleryContainer.appendChild(imgElement);
        });

        // Contacts (Generated with translatable <span> tags)
        const contactsContainer = document.getElementById("contacts-container");
        contactsContainer.innerHTML = "";
        (studio.contacts || []).forEach((contact) => {
          const card = document.createElement("div");
          card.className = "card contact-section-card";
          card.innerHTML = `
            <div class="contact-top" style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
              <div class="contact-icon" style="background-color: #4A1A1A; width: 40px; height: 40px; border-radius: 10px; display: flex; justify-content: center; align-items: center; flex-shrink: 0;">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M16.6627 3.33301H3.33255C2.41229 3.33301 1.66628 4.07902 1.66628 4.99928V14.9969C1.66628 15.9172 2.41229 16.6632 3.33255 16.6632H16.6627C17.583 16.6632 18.329 15.9172 18.329 14.9969V4.99928C18.329 4.07902 17.583 3.33301 16.6627 3.33301Z" stroke="#FE0D00" stroke-width="1.66627" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M18.329 5.83203L10.8558 10.5809C10.5986 10.7421 10.3012 10.8275 9.99764 10.8275C9.69412 10.8275 9.39673 10.7421 9.13951 10.5809L1.66628 5.83203" stroke="#FE0D00" stroke-width="1.66627" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>

              <div class="contact-info">
                <span class="contact-label" style="display: block; font-size: 12px; color: #888;">Email</span>
                <span class="studio-email-text" style="display: block; font-size: 16px; color: white;">${contact.email}</span>
              </div>
            </div>

            <a href="mailto:${contact.email}" class="cta-button-new">
              <span class="cta-contact-text">Contact</span> ${contact.label}
              <svg width="17" height="20" viewBox="0 0 17 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3.54169 10H13.4584" stroke="#FDFDFD" stroke-width="1.66627" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M8.5 4.1665L13.4583 9.99984L8.5 15.8332" stroke="#FDFDFD" stroke-width="1.66627" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>
          `;
          contactsContainer.appendChild(card);
        });

        // Re-apply language immediately after building the dynamic content
        setLanguage(localStorage.getItem("language") || "en");
      }

      // --- 4. INITIALIZE PAGE ---
      setLanguage(localStorage.getItem("language") || "en");
      renderStudioDetails();

      // Back button logic
      const backButton = document.getElementById("backButton");
      backButton.addEventListener("click", () => {
        const urlParams = new URLSearchParams(window.location.search);
        window.location.href = urlParams.get("from") === "map" ? "map.html" : "overview.html";
      });
    </script>
  </body>
</html>
