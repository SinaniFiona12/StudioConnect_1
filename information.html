<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AED Studios - The Orangerie</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="logo-area">
        <div class="logo-placeholder">
          <img src="/images/Logo.svg" alt="logo" />
        </div>
        <div class="logo-text">
          <strong>AED STUDIOS</strong>
          <span>Creative Network</span>
        </div>
      </div>

      <div class="language-toggles">
        <button class="lang-btn" data-lang="nl">NL</button>
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="fr">FR</button>
      </div>
    </header>

    <nav class="sub-nav">
      <button class="back-btn" id="backButton">
        <img src="/images/Button.svg" alt="Terug" />
      </button>
      <h2 id="page-title">Loading...</h2>
    </nav>

    <main>
      <section class="hero">
        <img
          id="hero-image"
          class="hero-bg"
          src="/images/image 2 (1).svg"
          alt="Hero Afbeelding"
        />
        <div class="hero-content">
          <div class="hero-icon">
            <img src="/images/Container (3).svg" alt="Orangerie Icon" />
          </div>
          <h1 id="studio-title">Loading...</h1>
        </div>
      </section>

      <section class="info-section">
        <h3 class="section-title" id="about-title">ABOUT STUDIO</h3>
        <div class="card">
          <p id="studio-description">Informatie wordt geladen...</p>
        </div>
      </section>

      <section class="info-section" id="references-section" hidden>
        <h3 class="section-title" id="references-title">REFERENCES</h3>
        <div class="references-scroll" id="references-container"></div>
      </section>

      <section class="info-section">
        <h3 class="section-title" id="gallery-title">GALLERY</h3>
        <div class="gallery-grid" id="gallery-container"></div>
      </section>

      <section class="info-section">
        <div id="contacts-container"></div>
      </section>

      <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
          <div class="nav-icon">
            <img src="/images/HomeIcon.svg" alt="Home" />
          </div>
          <span id="nav-home">Home</span>
        </a>

        <a href="map.html" class="nav-item">
          <div class="nav-icon">
            <img src="/images/MapIcontrans.svg" alt="Map" />
          </div>
          <span id="nav-map">Map</span>
        </a>

        <a href="overview.html" class="nav-item">
          <div class="nav-icon">
            <img src="/images/StudioIcontrans.svg" alt="Studio's" />
          </div>
          <span id="nav-studios">Studio's</span>
        </a>

        <a href="eventCode.html" id="eventNavBtn" class="nav-item">
          <div class="nav-icon">
            <img src="/images/EventIcontrans.svg" alt="Event" />
          </div>
          <span id="nav-event">Event</span>
        </a>
      </nav>
    </main>

    <script type="module">
      import { supabase } from "./src/supabase.js";

      const translations = {
        nl: { about: "OVER STUDIO", references: "REFERENTIES", gallery: "GALERIJ", navHome: "Home", navMap: "Kaart", navStudios: "Studio's", navEvent: "Event" },
        en: { about: "ABOUT STUDIO", references: "REFERENCES", gallery: "GALLERY", navHome: "Home", navMap: "Map", navStudios: "Studios", navEvent: "Event" },
        fr: { about: "À PROPOS DU STUDIO", references: "RÉFÉRENCES", gallery: "GALERIE", navHome: "Accueil", navMap: "Carte", navStudios: "Studios", navEvent: "Événement" },
      };

      function setText(id, text) {
        const element = document.getElementById(id);
        if (element) element.textContent = text;
      }

      function setLanguage(lang) {
        const t = translations[lang];
        setText("about-title", t.about);
        setText("references-title", t.references);
        setText("gallery-title", t.gallery);
        setText("nav-home", t.navHome);
        setText("nav-map", t.navMap);
        setText("nav-studios", t.navStudios);
        setText("nav-event", t.navEvent);
        document.querySelectorAll(".lang-btn").forEach((button) => {
          button.classList.toggle("active", button.dataset.lang === lang);
        });
        localStorage.setItem("language", lang);
      }

      document.querySelectorAll(".lang-btn").forEach((button) => {
        button.addEventListener("click", () => setLanguage(button.dataset.lang));
      });

      // --- DE FIX VAN JE VRIEND: SUPABASE STORAGE URLS ---
      function getStorageImageUrl(path, bucket = "images") {
        if (!path) return "";
        // Als het al een volledige URL is
        if (path.startsWith("http")) {
          return path;
        }
        // Haal eventuele slash vooraan weg
        const cleanPath = path.startsWith("/") ? path.slice(1) : path;
        const { data } = supabase.storage.from(bucket).getPublicUrl(cleanPath);
        return data.publicUrl;
      }

      function getGalleryImageUrl(path) {
        return getStorageImageUrl(path, "images"); 
      }

      function getReferenceImageUrl(path) {
        return getStorageImageUrl(path, "references"); 
      }
      // ----------------------------------------------------

      async function fetchStudioDetails(studioId) {
        const { data: studio, error } = await supabase.from("studios").select("*").eq("id", studioId).single();
        if (error) { console.error("Error fetching studio details:", error); return null; }
        return studio;
      }

      async function renderStudioDetails() {
        const params = new URLSearchParams(window.location.search);
        const studioId = params.get("id");
        if (!studioId) return;

        const studio = await fetchStudioDetails(studioId);
        if (!studio) return;

        document.getElementById("page-title").textContent = studio.name;
        document.getElementById("studio-title").textContent = studio.name;
        document.getElementById("studio-description").textContent = studio.description;

        // 1. BANNER FIX
        if (studio.banner) {
          document.getElementById("hero-image").src = getGalleryImageUrl(studio.banner);
        }

        // 2. REFERENCES FIX
        const referencesSection = document.getElementById("references-section");
        const referencesContainer = document.getElementById("references-container");
        const references = studio.references || [];
        referencesContainer.innerHTML = "";
        referencesSection.hidden = references.length === 0;

        references.forEach((imageUrl) => {
          const imgElement = document.createElement("img");
          imgElement.src = getReferenceImageUrl(imageUrl);
          imgElement.alt = "Reference Image";
          imgElement.className = "reference-card";
          referencesContainer.appendChild(imgElement);
        });

        // 3. GALLERY FIX
        const galleryContainer = document.getElementById("gallery-container");
        galleryContainer.innerHTML = "";
        (studio.gallery || []).forEach((imageUrl) => {
          const imgElement = document.createElement("img");
          imgElement.src = getGalleryImageUrl(imageUrl);
          imgElement.alt = "Gallery Image";
          galleryContainer.appendChild(imgElement);
        });

        // Contacts (Local icons)
        const contactsContainer = document.getElementById("contacts-container");
        contactsContainer.innerHTML = "";
        (studio.contacts || []).forEach((contact) => {
          const card = document.createElement("div");
          card.className = "card contact-section-card";
          card.innerHTML = `
            <div class="contact-top" style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
              <div class="contact-icon" style="background-color: #4A1A1A; width: 40px; height: 40px; border-radius: 10px; display: flex; justify-content: center; align-items: center; flex-shrink: 0;">
                <img src="/images/Icon.svg" alt="Email Icon" style="width: 20px; height: 20px;">
              </div>
              <div class="contact-info">
                <span class="contact-label" style="display: block; font-size: 12px; color: #888;">Email</span>
                <span class="studio-email-text" style="display: block; font-size: 16px; color: white;">${contact.email}</span>
              </div>
            </div>
            <a href="mailto:${contact.email}" class="cta-button-new">
              Contact ${contact.label} <img src="/images/Icon%20(5).svg" alt="Arrow">
            </a>
          `;
          contactsContainer.appendChild(card);
        });
      }

      setLanguage(localStorage.getItem("language") || "en");
      renderStudioDetails();

      const backButton = document.getElementById("backButton");
      backButton.addEventListener("click", () => {
        const urlParams = new URLSearchParams(window.location.search);
        window.location.href = urlParams.get("from") === "map" ? "map.html" : "overview.html";
      });
    </script>
  </body>
</html>
