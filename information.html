<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AED Studios - The Orangerie</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="logo-area">
        <div class="logo-placeholder">
          <img src="./images/Logo.svg" alt="logo" />
        </div>
        <div class="logo-text">
          <strong>AED STUDIOS</strong>
          <span>Creative Network</span>
        </div>
      </div>

      <div class="language-toggles">
        <button class="lang-btn" data-lang="nl">NL</button>
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="fr">FR</button>
      </div>
    </header>

    <nav class="sub-nav">
      <button class="back-btn" id="backButton">
        <img src="images/Button.svg" alt="Terug" />
      </button>
      <h2 id="page-title">Loading...</h2>
    </nav>

    <main>
      <section class="hero">
        <img
          id="hero-image"
          class="hero-bg"
          src="images/image 2 (1).svg"
          alt="Hero Afbeelding"
        />
        <div class="hero-content">
          <div class="hero-icon">
            <img src="images/Container (3).svg" alt="Orangerie Icon" />
          </div>
          <h1 id="studio-title">Loading...</h1>
        </div>
      </section>

      <section class="info-section">
        <h3 class="section-title" id="about-title">ABOUT STUDIO</h3>
        <div class="card">
          <p id="studio-description">Informatie wordt geladen...</p>
        </div>
      </section>

      <section class="info-section" id="references-section" hidden>
        <h3 class="section-title" id="references-title">REFERENCES</h3>
        <div class="references-scroll" id="references-container"></div>
      </section>

      <section class="info-section">
        <h3 class="section-title" id="gallery-title">GALLERY</h3>
        <div class="gallery-grid" id="gallery-container"></div>
      </section>

      <section class="info-section">
        <div id="contacts-container"></div>
      </section>

      <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
          <div class="nav-icon">
            <img src="./images/HomeIcon.svg" alt="Home" />
          </div>
          <span id="nav-home">Home</span>
        </a>

        <a href="map.html" class="nav-item">
          <div class="nav-icon">
            <img src="./images/MapIcontrans.svg" alt="Map" />
          </div>
          <span id="nav-map">Map</span>
        </a>

        <a href="overview.html" class="nav-item">
          <div class="nav-icon">
            <img src="./images/StudioIcontrans.svg" alt="Studio's" />
          </div>
          <span id="nav-studios">Studio's</span>
        </a>

        <a href="eventCode.html" id="eventNavBtn" class="nav-item">
          <div class="nav-icon">
            <img src="./images/EventIcontrans.svg" alt="Event" />
          </div>
          <span id="nav-event">Event</span>
        </a>
      </nav>
    </main>

    <script type="module">
      import { supabase } from "./src/supabase.js";

      const translations = {
        nl: {
          about: "OVER STUDIO",
          references: "REFERENTIES",
          gallery: "GALERIJ",
          navHome: "Home",
          navMap: "Kaart",
          navStudios: "Studio's",
          navEvent: "Event",
        },
        en: {
          about: "ABOUT STUDIO",
          references: "REFERENCES",
          gallery: "GALLERY",
          navHome: "Home",
          navMap: "Map",
          navStudios: "Studios",
          navEvent: "Event",
        },
        fr: {
          about: "À PROPOS DU STUDIO",
          references: "RÉFÉRENCES",
          gallery: "GALERIE",
          navHome: "Accueil",
          navMap: "Carte",
          navStudios: "Studios",
          navEvent: "Événement",
        },
      };

      function setText(id, text) {
        const element = document.getElementById(id);
        if (element) {
          element.textContent = text;
        }
      }

      function setLanguage(lang) {
        const t = translations[lang];

        setText("about-title", t.about);
        setText("references-title", t.references);
        setText("gallery-title", t.gallery);
        setText("nav-home", t.navHome);
        setText("nav-map", t.navMap);
        setText("nav-studios", t.navStudios);
        setText("nav-event", t.navEvent);

        document.querySelectorAll(".lang-btn").forEach((button) => {
          button.classList.toggle("active", button.dataset.lang === lang);
        });

        localStorage.setItem("language", lang);
      }

      document.querySelectorAll(".lang-btn").forEach((button) => {
        button.addEventListener("click", () => {
          setLanguage(button.dataset.lang);
        });
      });

      // --- 1. FETCH STUDIO DETAILS FROM SUPABASE ---
      async function fetchStudioDetails(studioId) {
        const { data: studio, error } = await supabase
          .from("studios")
          .select("*")
          .eq("id", studioId)
          .single();

        if (error) {
          console.error("Error fetching studio details:", error);
          return null;
        }
        return studio;
      }

      // --- 2. RENDER STUDIO DETAILS ---
      async function renderStudioDetails() {
        const params = new URLSearchParams(window.location.search);
        const studioId = params.get("id");

        if (!studioId) {
          console.error("No studio ID provided in the URL.");
          return;
        }

        const studio = await fetchStudioDetails(studioId);

        if (!studio) {
          console.error("Studio not found.");
          return;
        }

        // Update page content
        document.getElementById("page-title").textContent = studio.name;
        document.getElementById("studio-title").textContent = studio.name;
        document.getElementById("studio-description").textContent =
          studio.description;

        if (studio.banner) {
          document.getElementById("hero-image").src = studio.banner;
        }

        // Render references
        const referencesSection = document.getElementById("references-section");
        const referencesContainer = document.getElementById(
          "references-container"
        );
        const references = studio.references || [];

        referencesContainer.innerHTML = "";
        referencesSection.hidden = references.length === 0;

        references.forEach((imageUrl) => {
          const imgElement = document.createElement("img");
          imgElement.src = imageUrl;
          imgElement.alt = "Reference Image";
          imgElement.className = "reference-card";
          referencesContainer.appendChild(imgElement);
        });

        // Render gallery
        const galleryContainer = document.getElementById("gallery-container");
        galleryContainer.innerHTML = "";
        (studio.gallery || []).forEach((imageUrl) => {
          const imgElement = document.createElement("img");
          imgElement.src = imageUrl;
          imgElement.alt = "Gallery Image";
          galleryContainer.appendChild(imgElement);
        });

        // Render contacts
        const contactsContainer = document.getElementById("contacts-container");
        contactsContainer.innerHTML = "";
        (studio.contacts || []).forEach((contact) => {
          const card = document.createElement("div");
          card.className = "card contact-section-card";

          card.innerHTML = `
            <div class="contact-top" style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
              <div class="contact-icon" style="background-color: #4A1A1A; width: 40px; height: 40px; border-radius: 10px; display: flex; justify-content: center; align-items: center; flex-shrink: 0;">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M16.6627 3.33301H3.33255C2.41229 3.33301 1.66628 4.07902 1.66628 4.99928V14.9969C1.66628 15.9172 2.41229 16.6632 3.33255 16.6632H16.6627C17.583 16.6632 18.329 15.9172 18.329 14.9969V4.99928C18.329 4.07902 17.583 3.33301 16.6627 3.33301Z" stroke="#FE0D00" stroke-width="1.66627" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M18.329 5.83203L10.8558 10.5809C10.5986 10.7421 10.3012 10.8275 9.99764 10.8275C9.69412 10.8275 9.39673 10.7421 9.13951 10.5809L1.66628 5.83203" stroke="#FE0D00" stroke-width="1.66627" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div class="contact-info">
                <span class="contact-label" style="display: block; font-size: 12px; color: #888;">Email</span>
                <span class="studio-email-text" style="display: block; font-size: 16px; color: white;">${contact.email}</span>
              </div>
            </div>

            <a href="mailto:${contact.email}" class="cta-button-new">
              Contact ${contact.label}
              <svg width="17" height="20" viewBox="0 0 17 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3.54169 10H13.4584" stroke="#FDFDFD" stroke-width="1.66627" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M8.5 4.1665L13.4583 9.99984L8.5 15.8332" stroke="#FDFDFD" stroke-width="1.66627" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>
          `;
          contactsContainer.appendChild(card);
        });
      }

      // --- 3. INITIALIZE PAGE ---
      setLanguage(localStorage.getItem("language") || "en");
      renderStudioDetails();

      const urlParams = new URLSearchParams(window.location.search);
      const from = urlParams.get("from");

      const backButton = document.getElementById("backButton");

      backButton.addEventListener("click", () => {
        if (from === "map") {
          window.location.href = "map.html";
        } else {
          window.location.href = "overview.html";
        }
      });

    </script>
  </body>
</html>
