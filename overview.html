<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AED Studios - Overview</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

    <style>

        /* Basis instellingen en Variabelen */
        :root {
            --bg-color: #282626;
            --text-color: #FDFDFD;
            --accent-color: #FE0D00;
            --card-bg: #333131;
            --font-main: 'Rubik', sans-serif;
            --text-muted: #999999;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            padding-bottom: 140px;
        }

       
        .main-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px;
            border-bottom:1px solid #fe0d005a;
        }

        .logo-area{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .logo-placeholder{
            
            color:white;
            width:60px;
            height:45px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-weight:bold;
            font-size:24px;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }

        .logo-text{
            display:flex;
            flex-direction:column;
        }

        .logo-text strong{
            font-size:16px;
        }

        .logo-text span{
            color:#888;
            font-size:12px;
        }

        .language-toggles{
            display:flex;
            gap:8px;
        }

        .lang-btn{
            background:#444;
            color:white;
            border:none;
            padding:8px 14px;
            border-radius:8px;
            font-family:var(--font-main);
            font-weight:bold;
            cursor:pointer;
        }

        .lang-btn.active{
            background:var(--accent-color);
        }

        /* Pagina Content Wrapper */
        .page-content {
            padding: 25px 20px;
        }

        /* Titel Sectie */
        .page-title-area {
            margin-bottom: 20px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Zoekbalk */
        .search-container {
            display: flex;
            align-items: center;
            background-color: var(--card-bg);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .search-icon {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            opacity: 0.6;
        }

        .search-input {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: var(--font-main);
            font-size: 14px;
            width: 100%;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        /* Lijst met Studios */
        .studios-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Individueel Studio Kaartje */
        .studio-card {
            display: flex;
            align-items: center;
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            transition: background-color 0.2s;
            text-decoration: none; 
            color: inherit;
        }

        .studio-card:active {
            background-color: #444;
        }

        /* Het blokje met het rode icoon erin */
        .studio-icon-box {
            width: 50px;
            height: 50px;
            background-color: rgba(254, 13, 0, 0.05); 
            border: 1px solid rgba(254, 13, 0, 0.2); 
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .studio-icon-box img {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        /* Tekst in het kaartje */
        .studio-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .studio-name {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .studio-type {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Rode pijltje naar rechts (GROTER GEMAAKT) */
        .arrow-right {
            width: 32px; /* Aangepast van 8px naar 16px */
            height: auto;
            margin-left: 15px;
            opacity: 1; /* Verhoogd naar 1 voor een vollere kleur */
        }

          .bottom-nav{
            position:fixed;
            bottom:0px;
            left:0px;
            right:0px;
            background:#2f2d2d;
            padding:18px 10px;
            display:flex;
            justify-content:space-around;
            box-shadow:0 15px 35px rgba(0,0,0,0.4);
            border-top:1px solid #4a4a4a;
        }

      .nav-item{
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    color:#8e8e8e;
    font-size:13px;
    cursor:pointer;
}

        .nav-icon{
            width:56px;
            height:56px;
            border-radius:18px;
            background:#3a3939;
            border:1px solid #5c5c5c;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:22px;
        }

      

        .nav-item.active .nav-icon{
            background:var(--accent-color);
            color:white;
            border:none;
            
        }
    </style>
</head>
<body>
    
    <header class="main-header">

    <div class="logo-area">
        <div class="logo-placeholder"><img src="./images/Logo.svg" alt="logo"></div>

            <div class="logo-text">
                <strong>AED STUDIOS</strong>
                <span>Creative Network</span>
            </div>
    </div>

    <div class="language-toggles">
        <button class="lang-btn">NL</button>
        <button class="lang-btn active">EN</button>
        <button class="lang-btn">FR</button>
    </div>

</header>

<main class="page-content">
    <div class="page-title-area">
        <h1 class="page-title">Studios Network</h1>
        <p class="page-subtitle">Discover 18 creative studios</p>
    </div>

    <div class="search-container">
        <img src="images/Icon (1).svg" alt="Search" class="search-icon">
        <input type="text" class="search-input" placeholder="Search studios...">
    </div>

    <div class="studios-list" id="studios-container">
        <p>Loading studios...</p>
    </div>

</main>

<nav class="bottom-nav">

    <a href="index.html" class="nav-item ">
        <div class="nav-icon">
            <img src="./images/HomeIcon.svg" alt="Home">
        </div>
        <span>Home</span>
    </a>

    <a href="map.html" class="nav-item">
        <div class="nav-icon">
            <img src="./images/MapIcontrans.svg" alt="Map">
        </div>
        <span>Map</span>
    </a>

    <a href="overview.html" class="nav-item active">
        <div class="nav-icon">
            <img src="./images/Studiofull.svg" alt="Studio's">
        </div>
        <span>Studio's</span>
    </a>

   <a href="#" id="eventNavBtn" class="nav-item">
        <div class="nav-icon">
            <img src="./images/EventIcontrans.svg" alt="Event">
        </div>
        <span>Event</span>
    </a>

</nav>

<script>

const eventNavBtn =
        document.getElementById("eventNavBtn");

    eventNavBtn.addEventListener("click", (e) => {

        e.preventDefault();

        const access =
            sessionStorage.getItem("eventAccess");

        /* USER HAS ACCESS */

        if(access === "granted"){

            window.location.href =
                "event-overview.html";

        }

        

        else{

            window.location.href =
                "EventCode.html";

        }

    });

    

    const studiosDatabase = [

        { id: "orangerie", name: "The orangerie", type: "Backstage" },
        { id: "studio1", name: "Studio 1", type: "Occupied by Banijay" },
        { id: "studio2", name: "Studio 2", type: "Occupied by Banijay" },
        { id: "studio3", name: "Studio 3", type: "Black box" },
        { id: "studio4", name: "Studio 4", type: "Black box" },
        { id: "studio5", name: "Studio 5", type: "Black box" },
        { id: "studio6", name: "Studio 6", type: "Restaurant" },
        { id: "studio7", name: "Studio 7", type: "Black box" },
        { id: "studio8", name: "Studio 8", type: "Auditorium" },
        { id: "studio9", name: "Studio 9", type: "Black box" },
        { id: "studio10A", name: "Studio 10A", type: "Black box" },
        { id: "studio10B", name: "Studio 10B", type: "Black box" },
        { id: "studio11", name: "Studio 11", type: "Black box" },
        { id: "studio12", name: "Studio 12", type: "Water tank" },
        { id: "studio14", name: "Studio 14", type: "Black box" },
        { id: "studio15", name: "Studio 15", type: "Occupied by Banijay" },
        { id: "studio16", name: "Studio 16", type: "Event hall" },
        { id: "cinema", name: "AED Cinema", type: "Cinema" }

    ];

    

    function renderStudiosList(studiosData){

        const container =
            document.getElementById(
                'studios-container'
            );

        container.innerHTML = '';

        studiosData.forEach(studio => {

            const cardElement =
                document.createElement('a');

            cardElement.href =
                "information.html";

            cardElement.className =
                'studio-card';

            cardElement.innerHTML = `

                <div class="studio-icon-box">

                    <img 
                        src="images/Icon (2).svg"
                        alt="Building Icon"
                    >

                </div>

                <div class="studio-info">

                    <div class="studio-name">
                        ${studio.name}
                    </div>

                    <div class="studio-type">
                        ${studio.type}
                    </div>

                </div>

                <img 
                    src="images/Container (4).svg"
                    alt="Arrow Right"
                    class="arrow-right"
                >

            `;

            container.appendChild(cardElement);

        });

    }

    

    renderStudiosList(studiosDatabase);


</script>
</body>
</html>
