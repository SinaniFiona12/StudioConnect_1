<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AED Studios - Overview</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <style>

    </style>
</head>
<body>
    
    <header class="main-header">

    <div class="logo-area">
        <div class="logo-placeholder"><img src="./images/Logo.svg" alt="logo"></div>

            <div class="logo-text">
                <strong>AED STUDIOS</strong>
                <span>Creative Network</span>
            </div>
    </div>

    <div class="language-toggles">
        <button class="lang-btn">NL</button>
        <button class="lang-btn">EN</button>
        <button class="lang-btn">FR</button>
    </div>

</header>

<main class="page-contect">
    <div class="page-title-area">
        <h1 class="page-title">Studios Network</h1>
        <p class="page-subtitle">Discover 18 creative studios</p>
    </div>

    <div class="search-container">
        <img src="images/Icon (1).svg" alt="Search" class="search-icon">
        <input type="text" class="search-input" placeholder="Search studios...">
    </div>

    <div class="studios-list" id="studios-container">
        <p>Loading studios...</p>
    </div>

</main>

<nav class="bottom-nav">
    <a href="index.html" class="nav-item "></a>
        <div class="nav-icon">
            <img src="./images/HomeIcon.svg" alt="Home">
        </div>
        <span>Home</span>
    </a>

    <a href="map.html" class="nav-item">
        <div class="nav-icon">
            <img src="./images/MapIcontrans.svg" alt="Map">
        </div>
        <span>Map</span>
    </a>

    <a href="overview.html" class="nav-item active">
        <div class="nav-icon">
            <img src="./images/Studiofull.svg" alt="Studio's">
        </div>
        <span>Studio's</span>
    </a>

   <a href="#" id="eventNavBtn" class="nav-item">
        <div class="nav-icon">
            <img src="./images/EventIcontrans.svg" alt="Event">
        </div>
        <span>Event</span>
    </a>
</nav>

<script>

const eventNavBtn =
        document.getElementById("eventNavBtn");

    eventNavBtn.addEventListener("click", (e) => {

        e.preventDefault();

        const access =
            sessionStorage.getItem("eventAccess");

        /* USER HAS ACCESS */

        if(access === "granted"){

            window.location.href =
                "event-overview.html";

        }

        

        else{

            window.location.href =
                "EventCode.html";

        }

    });

    

    const studiosDatabase = [

        { id: "orangerie", name: "The orangerie", type: "Backstage" },
        { id: "studio1", name: "Studio 1", type: "Occupied by Banijay" },
        { id: "studio2", name: "Studio 2", type: "Occupied by Banijay" },
        { id: "studio3", name: "Studio 3", type: "Black box" },
        { id: "studio4", name: "Studio 4", type: "Black box" },
        { id: "studio5", name: "Studio 5", type: "Black box" },
        { id: "studio6", name: "Studio 6", type: "Restaurant" },
        { id: "studio7", name: "Studio 7", type: "Black box" },
        { id: "studio8", name: "Studio 8", type: "Auditorium" },
        { id: "studio9", name: "Studio 9", type: "Black box" },
        { id: "studio10A", name: "Studio 10A", type: "Black box" },
        { id: "studio10B", name: "Studio 10B", type: "Black box" },
        { id: "studio11", name: "Studio 11", type: "Black box" },
        { id: "studio12", name: "Studio 12", type: "Water tank" },
        { id: "studio14", name: "Studio 14", type: "Black box" },
        { id: "studio15", name: "Studio 15", type: "Occupied by Banijay" },
        { id: "studio16", name: "Studio 16", type: "Event hall" },
        { id: "cinema", name: "AED Cinema", type: "Cinema" }

    ];

    

    function renderStudiosList(studiosData){

        const container =
            document.getElementById(
                'studios-container'
            );

        container.innerHTML = '';

        studiosData.forEach(studio => {

            const cardElement =
                document.createElement('a');

            cardElement.href =
                "information.html";

            cardElement.className =
                'studio-card';

            cardElement.innerHTML = `

                <div class="studio-icon-box">

                    <img 
                        src="images/Icon (2).svg"
                        alt="Building Icon"
                    >

                </div>

                <div class="studio-info">

                    <div class="studio-name">
                        ${studio.name}
                    </div>

                    <div class="studio-type">
                        ${studio.type}
                    </div>

                </div>

                <img 
                    src="images/Container (4).svg"
                    alt="Arrow Right"
                    class="arrow-right"
                >

            `;

            container.appendChild(cardElement);

        });

    }

    

    renderStudiosList(studiosDatabase);


</script>
</body>
</html>
