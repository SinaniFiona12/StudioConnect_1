<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AED Studios - Overview</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="logo-area">
        <div class="logo-placeholder">
          <img src="./images/Logo.svg" alt="logo" />
        </div>
        <div class="logo-text">
          <strong>AED STUDIOS</strong>
          <span>Creative Network</span>
        </div>
      </div>

      <div class="language-toggles">
        <button class="lang-btn" data-lang="nl">NL</button>
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="fr">FR</button>
      </div>
    </header>

    <main class="page-content">
      <div class="page-title-area">
        <h1 class="page-title" id="page-title-text">Studios Network</h1>
        <p class="page-subtitle" id="page-subtitle-text">
          Discover creative studios
        </p>
      </div>

      <div class="search-container">
        <img src="images/Icon (1).svg" alt="Search" class="search-icon" />
        <input
          type="text"
          class="search-input"
          id="search-input"
          placeholder="Search studios..."
        />
      </div>

      <div class="studios-list" id="studios-container">
        <p>Loading studios...</p>
      </div>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <div class="nav-icon">
          <img src="./images/HomeIcon.svg" alt="Home" />
        </div>
        <span>Home</span>
      </a>

      <a href="map.html" class="nav-item">
        <div class="nav-icon">
          <img src="./images/MapIcontrans.svg" alt="Map" />
        </div>
        <span>Map</span>
      </a>

      <a href="overview.html" class="nav-item active">
        <div class="nav-icon">
          <img src="./images/Studiofull.svg" alt="Studio's" />
        </div>
        <span>Studio's</span>
      </a>

      <a href="eventCode.html" id="eventNavBtn" class="nav-item">
        <div class="nav-icon">
          <img src="./images/EventIcontrans.svg" alt="Event" />
        </div>
        <span>Event</span>
      </a>
    </nav>

    <script type="module">
      import { supabase } from "./src/supabase.js";

      let allStudios = [];

      // --- 1. FETCH STUDIOS FROM SUPABASE ---
      async function fetchStudios() {
        const { data: studios, error } = await supabase
          .from("studios")
          .select("*")
          .order("name", { ascending: true });

        if (error) {
          console.error("Error fetching studios:", error);
          return [];
        }

        return studios || [];
      }

      // --- 2. RENDER STUDIOS ---
      function renderStudioCards(studios) {
        const container = document.getElementById("studios-container");
        container.innerHTML = "";

        if (studios.length === 0) {
          container.innerHTML = "<p>No studios found.</p>";
          return;
        }

        studios.forEach((studio) => {
          const cardElement = document.createElement("a");
          cardElement.href = `information.html?id=${studio.id}`;
          cardElement.className = "studio-card";

          cardElement.innerHTML = `
            <div class="studio-icon-box">
              <img src="images/Icon (2).svg" alt="Building Icon">
            </div>
            <div class="studio-info">
              <div class="studio-name">${studio.name}</div>
              <div class="studio-type">Creative production space</div>
            </div>
            <img src="images/Container (4).svg" alt="Arrow Right" class="arrow-right">
          `;

          container.appendChild(cardElement);
        });
      }

      async function renderStudios() {
        allStudios = await fetchStudios();
        renderStudioCards(allStudios);
      }

      // --- 3. SEARCH STUDIOS ---
      document.getElementById("search-input").addEventListener("input", (event) => {
        const searchTerm = event.target.value.toLowerCase();

        const filteredStudios = allStudios.filter((studio) =>
          studio.name.toLowerCase().includes(searchTerm)
        );

        renderStudioCards(filteredStudios);
      });

      // --- 4. INITIALIZE PAGE ---
      renderStudios();
    </script>
  </body>
</html>
