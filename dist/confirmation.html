<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirmation</title>

    <link rel="stylesheet" crossorigin href="/assets/style-Dri6nCMG.css">
  </head>

  <body>
    <main class="success-page">
      <div class="success-card">
        <div class="success-icon">
          <img src="data:image/svg+xml,%3csvg%20width='48'%20height='48'%20viewBox='0%200%2048%2048'%20fill='none'%20xmlns='http://www.w3.org/2000/svg'%3e%3cpath%20d='M23.996%2043.993C35.0399%2043.993%2043.9928%2035.0402%2043.9928%2023.9963C43.9928%2012.9524%2035.0399%203.99951%2023.996%203.99951C12.9521%203.99951%203.99927%2012.9524%203.99927%2023.9963C3.99927%2035.0402%2012.9521%2043.993%2023.996%2043.993Z'%20stroke='%23FDFDFD'%20stroke-width='3.99935'%20stroke-linecap='round'%20stroke-linejoin='round'/%3e%3cpath%20d='M17.9971%2023.9959L21.9964%2027.9953L29.9951%2019.9966'%20stroke='%23FDFDFD'%20stroke-width='3.99935'%20stroke-linecap='round'%20stroke-linejoin='round'/%3e%3c/svg%3e" alt="Success" />
        </div>

        <h1 data-translate="successTitle"></h1>

        <p data-translate="successText"></p>
      </div>
    </main>

    <script>
      const translations = {
        en: {
          successTitle: "Successfully Registered!",

          successText: "You're registered for the event. See you there!",
        },

        nl: {
          successTitle: "Succesvol Geregistreerd!",

          successText: "Je bent geregistreerd voor het event. Tot dan!",
        },

        fr: {
          successTitle: "Inscription Réussie !",

          successText: "Vous êtes inscrit à l'événement. À bientôt !",
        },
      };

      function setLanguage(language) {
        document.querySelectorAll("[data-translate]").forEach((element) => {
          const key = element.dataset.translate;

          element.textContent = translations[language][key];
        });
      }

      const savedLanguage = localStorage.getItem("language") || "en";

      setLanguage(savedLanguage);

      localStorage.setItem("eventAccess", "granted");

      setTimeout(() => {
        window.location.href = "event-overview.html";
      }, 5000);
    </script>
  </body>
</html>
