    <style>

        .bodymap {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            padding-bottom:120px;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* MAP AREA */
        .map-container {
            position: relative;
            flex-grow: 1;
            width: 100%;
            overflow: hidden;
            background-color: #1a1919; 
            cursor: grab;
        }

        .map-container:active {
            cursor: grabbing;
        }

        .map-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1200px;
            height: 1200px;
            transform-origin: center;

            background-image: url("/assets/Map_AEDStudios-DF-6Cdbo.svg");
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
        }

        /* PINS OP DE MAP */
        .map-pin {
            position: absolute;

            width: 42px;
            height: 42px;

            background-color: var(--accent-color);

            border-radius: 50% 50% 50% 0;

            transform: rotate(-45deg);

            display: flex;
            justify-content: center;
            align-items: center;

            box-shadow: 0 4px 10px rgba(0,0,0,0.5);

            cursor: pointer;

            transition: transform 0.2s;
        }

        /* inhoud terug recht zetten */
        .map-pin img,
        .map-pin {
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .map-pin img,
        .map-pin span {
            transform: rotate(45deg);
        }

        .map-pin img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }


        .map-pin img {
            width: 44px; 
            height: 44px; 
            object-fit: contain;
        }

        /* Pin Posities */
        #pin-orangerie { top: 21%; left: 7%; }
        #pin-2 { top: 55%; left: 60%; }
        #pin-12 { top: 65%; left: 40%; }

        /* PIJLTJES LINKS EN RECHTS */
        .side-arrow-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 55;
            padding: 10px;
        }

        .side-arrow-btn img {
            width: 24px;
            height: auto;
        }

        #arrow-left {
            left: 15px;
        }

        #arrow-right {
            right: 15px;
        }

        /* LEGEND */
        .map-legend {
            position: absolute;
            bottom: 120px;
            left: 20px;
            background-color: #4a1a1a;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 50;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #ddd;
        }

        .dot-white {
            width: 10px;
            height: 10px;
            background-color: white;
            border-radius: 50%;
            margin-left: 5px;
            margin-right: 5px;
        }

        .icon-red {
            width: 20px;
            height: 20px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon-red img {
            width: 10px;
            height: 10px;
            filter: brightness(0) invert(1);
        }

        /* OVERLAY POPUP CARD (Aangepast: Gecentreerd in het midden) */
        .overlay-popup {
            position: absolute;
            top: 150%; /* Start ver onder het scherm */
            left: 50%;
            transform: translate(-50%, -50%); 
            width: 90%;
            max-width: 400px;
            background-color: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 60;
            opacity: 0; 
            pointer-events: none; 
        }

        .overlay-popup.active {
            top: 45%; /* Verplaatst de popup naar het midden (ietsje hoger ivm navigatie) */
            opacity: 1; 
            pointer-events: auto; 
        }

        .overlay-image-area {
            position: relative;
            height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .overlay-image-area::before {
            content: '';
            position: absolute;
            inset: 0;

            background-image:
                var(--popup-image);

            background-size: cover;
            background-position: center;
            opacity: 0.6;
        }

        .overlay-image-area::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(60, 10, 10, 0.5); 
        }

        .overlay-badge {
            position: relative;
            z-index: 2;
            background-color: var(--accent-color);
            width: 70px;
            height: 70px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .overlay-badge img {
            width: 36px;
            height: 36px;
        }

        .overlay-title {
            position: relative;
            z-index: 2;
            font-size: 20px;
            font-weight: 700;
        }

        .overlay-action {
            display: flex;
            align-items: center;
            padding: 20px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 15px;
        }

        .overlay-action span {
            flex-grow: 1;
        }

        .overlay-action img {
            width: 18px;
            height: auto;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed;
            bottom: 0px;
            left: 0px;
            right: 0px;
            background: #2f2d2d;
            padding: 18px 10px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border-top: 1px solid #4a4a4a;
            z-index: 100;
        }

        .nav-item {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: #8e8e8e;
            font-size: 13px;
            cursor: pointer;
        }

        .nav-icon {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: #3a3939;
            border: 1px solid #5c5c5c;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
        }

        .nav-item.active .nav-icon {
            background: var(--accent-color);
