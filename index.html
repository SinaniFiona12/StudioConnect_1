<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AED Studios - Home</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        

.hero-section{
    position:relative;
}

.hero-slider{
    overflow:hidden;
    position:relative;
    height:290px;
}

.hero-slide{
    position:absolute;
    inset:0;

    opacity:0;
    transition:0.4s;
}

.hero-slide.active{
    opacity:1;
}

.hero-image{
    width:100%;
    height:100%;
    object-fit:cover;
}

.hero-overlay{
    position:absolute;
    inset:0;

    background:
    linear-gradient(
        to top,
        rgba(0,0,0,0.9),
        rgba(0,0,0,0.1)
    );
}

.hero-content{
    position:absolute;
    left:24px;
    bottom:30px;
    z-index:2;
}

.hero-tag{
    background:var(--accent-color);

    width:fit-content;

    padding:6px 10px;

    border-radius:12px;

    font-size:13px;

    margin-bottom:14px;
}

.hero-content h1{
    font-size:24px;
    margin-bottom:8px;
}

.hero-content p{
    color:#D1CECE;
    margin-bottom:6px;
}

.hero-content span{
    color:#9F9B9B;
    font-size:14px;
}

/* DOTS */

.hero-dots{
    position:absolute;
    bottom:18px;
    left:50%;

    transform:translateX(-50%);

    display:flex;
    gap:8px;

    z-index:3;
}

.hero-dot{
    width:8px;
    height:8px;

    border-radius:50%;

    background:#989393;
}

.hero-dot.active{
    background:var(--accent-color);
}

/* NEWS */

.news-section{
    padding:28px 16px;
}

.section-title{
    display:flex;
    align-items:center;
    gap:10px;

    margin-bottom:20px;
}

.section-title h2{
    font-size:18px;
}

.news-scroll{
    display:flex;
    gap:14px;

    overflow-x:auto;

    scrollbar-width:none;
}

.news-scroll::-webkit-scrollbar{
    display:none;
}

.news-card{
    min-width:290px;

    background:#333131;

    border-radius:22px;

    padding:18px;

    flex-shrink:0;
}

.active-news{
    background:var(--accent-color);
}

.news-top{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:20px;
}

.news-icon{
    width:48px;
    height:48px;

    border-radius:16px;

    background:rgba(255,255,255,0.15);

    display:flex;
    justify-content:center;
    align-items:center;
}

.news-top span{
    font-size:13px;
    opacity:0.9;
}

.news-card h3{
    font-size:18px;
    margin-bottom:12px;
}

.news-card p{
    line-height:1.8;
    font-size:15px;
}

/* PRODUCTIONS */

.productions-section{
    padding:0 16px;
}

.productions-title{
    font-size:20px;
    margin-bottom:20px;
}

.production-list{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.production-card{
    background:#1F1F24;

    border-radius:18px;

    padding:14px;

    display:flex;
    align-items:center;
    gap:14px;
}

.production-thumb{
    width:74px;
    height:74px;

    border-radius:14px;

    object-fit:cover;
}

.production-info h3{
    font-size:16px;
    margin-bottom:8px;
}

.production-info p{
    color:#B0ACAC;
    margin-bottom:8px;
}

.production-info span{
    color:#8E8A8A;
    font-size:14px;
}

    </style>
</head>
<body>

<header class="main-header">

    <div class="logo-area">

        <div class="logo-placeholder">
            <img src="./images/Logo.svg" alt="logo">
        </div>

        <div class="logo-text">

            <strong>AED STUDIOS</strong>

            <span>Creative Network</span>

        </div>

    </div>

    <div class="language-toggles">

        <button class="lang-btn" id="btn-nl">
            NL
        </button>

        <button class="lang-btn active" id="btn-en">
            EN
        </button>

        <button class="lang-btn" id="btn-fr">
            FR
        </button>

    </div>

</header>
<!-- HERO -->

<section class="hero-section">

    <div class="hero-slider" id="heroSlider"></div>

    <div class="hero-dots" id="heroDots"></div>

</section>

<!-- NEWS -->

<section class="news-section">

    <div class="section-title">

        <img src="./images/newsred.svg">

        <h2>Actualiteit</h2>

    </div>

    <div class="news-scroll" id="newsScroll"></div>

</section>

<!-- PRODUCTIONS -->

<section class="productions-section">

    <h2 class="productions-title">
        Actieve Producties
    </h2>

    <div class="production-list" id="productionList"></div>

</section>

<nav class="bottom-nav">

    <a href="index.html" class="nav-item active">

        <div class="nav-icon">
            <img src="./images/HomeIconfull.svg">
        </div>

        <span data-translate="navHome"></span>

    </a>

    <a href="map.html" class="nav-item">

        <div class="nav-icon">
            <img src="./images/MapIcontrans.svg">
        </div>

        <span data-translate="navMap"></span>

    </a>

    <a href="overview.html" class="nav-item">

        <div class="nav-icon">
            <img src="./images/StudioIcontrans.svg">
        </div>

        <span data-translate="navStudios"></span>

    </a>

    <a href="#" id="eventNavBtn" class="nav-item">

        <div class="nav-icon">
            <img src="./images/EventIcontrans.svg">
        </div>

        <span data-translate="navEvent"></span>

    </a>

</nav>

<script>
/* HERO DATABASE */

const heroSlides = [

    {
        tag: "Recent opgenomen",
        title: "De Container Cup",
        subtitle: "Seizoen 4 • 2024",
        channel: "VTM",
        image: "./images/containercup.png"
    },

    {
        tag: "Live productie",
        title: "The Voice",
        subtitle: "Seizoen 3 • 2024",
        channel: "VTM",
        image: "./images/thevoicehero.png"
    },

    {
        tag: "Nieuwe productie",
        title: "Quiz With Balls",
        subtitle: "Studio 5 • 2024",
        channel: "Play4",
        image: "./images/quizhero.png"
    }

];

/* NEWS DATABASE */

const newsItems = [

    {
        active: true,
        icon: "./images/flash.svg",
        date: "2 dagen geleden",
        title: "Nieuwe studio geopend",
        text:
        "Studio 16 is nu beschikbaar voor bookings met state-of-the-art 4K camera equipment."
    },

    {
        active: false,
        icon: "./images/newsred.svg",
        date: "5 dagen geleden",
        title: "Upgrades netwerk",
        text:
        "Snellere verbindingen tussen alle studio's dankzij nieuwe infrastructuur."
    },

    {
        active: false,
        icon: "./images/camera.svg",
        date: "1 week geleden",
        title: "Nieuwe camera gear",
        text:
        "Nieuwe RED cinema camera's toegevoegd aan de equipment pool."
    }

];

/* PRODUCTIONS DATABASE */

const productions = [

    {
        image: "./images/familie.png",
        title: "Familie",
        studio: "Studio 1",
        time: "08:00 - 18:00"
    },

    {
        image: "./images/voice.png",
        title: "The Voice",
        studio: "Studio 3",
        time: "10:00 - 22:00"
    },

    {
        image: "./images/quiz.png",
        title: "Quiz with Balls",
        studio: "Studio 5",
        time: "14:00 - 20:00"
    }

];

/* HERO GENERATION */

const heroSlider =
    document.getElementById(
        "heroSlider"
    );

const heroDots =
    document.getElementById(
        "heroDots"
    );

heroSlides.forEach((slide, index) => {

    heroSlider.innerHTML += `

        <div class="hero-slide ${index === 0 ? "active" : ""}">

            <img 
                src="${slide.image}"
                class="hero-image"
            >

            <div class="hero-overlay"></div>

            <div class="hero-content">

                <div class="hero-tag">
                    ${slide.tag}
                </div>

                <h1>
                    ${slide.title}
                </h1>

                <p>
                    ${slide.subtitle}
                </p>

                <span>
                    ${slide.channel}
                </span>

            </div>

        </div>

    `;

    heroDots.innerHTML += `

        <div class="hero-dot ${index === 0 ? "active" : ""}"></div>

    `;

});

/* NEWS GENERATION */

const newsScroll =
    document.getElementById(
        "newsScroll"
    );

newsItems.forEach(news => {

    newsScroll.innerHTML += `

        <div class="news-card ${news.active ? "active-news" : ""}">

            <div class="news-top">

                <div class="news-icon">

                    <img src="${news.icon}">

                </div>

                <span>
                    ${news.date}
                </span>

            </div>

            <h3>
                ${news.title}
            </h3>

            <p>
                ${news.text}
            </p>

        </div>

    `;

});

/* PRODUCTIONS GENERATION */

const productionList =
    document.getElementById(
        "productionList"
    );

productions.forEach(item => {

    productionList.innerHTML += `

        <div class="production-card">

            <img 
                src="${item.image}"
                class="production-thumb"
            >

            <div class="production-info">

                <h3>${item.title}</h3>

                <p>${item.studio}</p>

                <span>
                    ⏱ ${item.time}
                </span>

            </div>

        </div>

    `;

});

/* HERO CAROUSEL */

const slides =
    document.querySelectorAll(
        ".hero-slide"
    );

const dots =
    document.querySelectorAll(
        ".hero-dot"
    );

let currentSlide = 0;

function showSlide(index){

    slides.forEach(slide =>
        slide.classList.remove("active")
    );

    dots.forEach(dot =>
        dot.classList.remove("active")
    );

    slides[index].classList.add("active");

    dots[index].classList.add("active");

}

setInterval(() => {

    currentSlide++;

    if(currentSlide >= slides.length){

        currentSlide = 0;

    }

    showSlide(currentSlide);

}, 4000);
</script>

</body>
</html>
