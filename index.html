<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AED Studios - Home</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">


</head>
<body>

<header class="main-header">

    <div class="logo-area">

        <div class="logo-placeholder">
            <img src="./images/Logo.svg" alt="logo">
        </div>

        <div class="logo-text">

            <strong>AED STUDIOS</strong>

            <span>Creative Network</span>

        </div>

    </div>

    <div class="language-toggles">

        <button class="lang-btn" id="btn-nl">
            NL
        </button>

        <button class="lang-btn active" id="btn-en">
            EN
        </button>

        <button class="lang-btn" id="btn-fr">
            FR
        </button>

    </div>

</header>
<!-- HERO -->

<section class="hero-section">

    <div class="hero-slider" id="heroSlider"></div>

    <div class="hero-dots" id="heroDots"></div>

</section>

<!-- NEWS -->

<section class="news-section">

    <div class="section-title">

        <img src="./images/speakersmall.svg">

        <h2>Actualiteit</h2>

    </div>

    <div class="news-scroll" id="newsScroll"></div>

</section>

<!-- PRODUCTIONS -->

<section class="productions-section">

    <h2 class="productions-title">
        Actieve Producties
    </h2>

    <div class="production-list" id="productionList"></div>

</section>

<nav class="bottom-nav">

    <a href="index.html" class="nav-item active ">
        <div class="nav-icon">
            <img src="./images/HomeIconfull.svg" alt="Home">
        </div>
        <span>Home</span>
    </a>

    <a href="map.html" class="nav-item">
        <div class="nav-icon">
            <img src="./images/MapIcontrans.svg" alt="Map">
        </div>
        <span>Map</span>
    </a>

    <a href="overview.html" class="nav-item ">
        <div class="nav-icon">
            <img src="./images/StudioIcontrans.svg" alt="Studio's">
        </div>
        <span>Studio's</span>
    </a>

   <a href="eventCode.html" id="eventNavBtn" class="nav-item">
        <div class="nav-icon">
            <img src="./images/EventIcontrans.svg" alt="Event">
        </div>
        <span>Event</span>
    </a>

</nav>

<script>
/* HERO DATABASE */

const heroSlides = [

    {
        tag: "Recent opgenomen",
        title: "Knokke Off",
        subtitle: "Seizoen 3 • 2026",
        channel: "VRT",
        image: "./images/image 37.svg"
    },

    {
        tag: "Comming soon",
        title: "Next to normaal",
        subtitle: "Rockmusical",
        channel: "Kadee producties",
        image: "./images/Nexttonormal.svg"
    },

    {
        tag: "Recent opgenomen",
        title: "Undercover",
        subtitle: "Studio 5 • 2024",
        channel: "Streamz",
        image: "./images/undercover.svg"
    }

];

/* NEWS DATABASE */

const newsItems = [

    {
        active: true,
        icon: "./images/Bliksem.svg",
        date: "2 dagen geleden",
        title: "Nieuwe studio geopend",
        text:
        "Studio 16 is nu beschikbaar voor bookings met state-of-the-art 4K camera equipment."
    },

    {
        active: false,
        icon: "./images/Speakerbig.svg",
        date: "5 dagen geleden",
        title: "Upgrades netwerk",
        text:
        "Snellere verbindingen tussen alle studio's dankzij nieuwe infrastructuur."
    },

    {
        active: false,
        icon: "./images/Calenderbig.svg",
        date: "1 week geleden",
        title: "Nieuwe camera gear",
        text:
        "Nieuwe RED cinema camera's toegevoegd aan de equipment pool."
    }

];

/* PRODUCTIONS DATABASE */

const productions = [

    {
        image: "./images/FamilieSmall.svg",
        title: "Familie",
        studio: "Studio 1",
        time: "08:00 - 18:00"
    },

    {
        image: "./images/VoiceSmall.svg",
        title: "The Voice",
        studio: "Studio 3",
        time: "10:00 - 22:00"
    },

    {
        image: "./images/quizSmall.svg",
        title: "Quiz with Balls",
        studio: "Studio 5",
        time: "14:00 - 20:00"
    }

];

/* HERO GENERATION */

const heroSlider =
    document.getElementById(
        "heroSlider"
    );

const heroDots =
    document.getElementById(
        "heroDots"
    );

heroSlides.forEach((slide, index) => {

    heroSlider.innerHTML += `

        <div class="hero-slide ${index === 0 ? "active" : ""}">

            <img 
                src="${slide.image}"
                class="hero-image"
            >

            <div class="hero-overlay"></div>

            <div class="hero-content">

                <div class="hero-tag">
                    ${slide.tag}
                </div>

                <h1>
                    ${slide.title}
                </h1>

                <p>
                    ${slide.subtitle}
                </p>

                <span>
                    ${slide.channel}
                </span>

            </div>

        </div>

    `;

    heroDots.innerHTML += `

        <div class="hero-dot ${index === 0 ? "active" : ""}"></div>

    `;

});

/* NEWS GENERATION */

const newsScroll =
    document.getElementById(
        "newsScroll"
    );

newsItems.forEach(news => {

    newsScroll.innerHTML += `

        <div class="news-card ${news.active ? "active-news" : ""}">

            <div class="news-top">

                <div class="news-icon">

                    <img src="${news.icon}">

                </div>

                <span>
                    ${news.date}
                </span>

            </div>

            <h3>
                ${news.title}
            </h3>

            <p>
                ${news.text}
            </p>

        </div>

    `;

});

/* PRODUCTIONS GENERATION */

const productionList =
    document.getElementById(
        "productionList"
    );

productions.forEach(item => {

    productionList.innerHTML += `

        <div class="production-card">

            <img 
                src="${item.image}"
                class="production-thumb"
            >

            <div class="production-info">

                <h3>${item.title}</h3>

                <p>${item.studio}</p>

                <span>
                    ⏱ ${item.time}
                </span>

            </div>

        </div>

    `;

});

/* HERO CAROUSEL */

const slides =
    document.querySelectorAll(
        ".hero-slide"
    );

const dots =
    document.querySelectorAll(
        ".hero-dot"
    );

let currentSlide = 0;

function showSlide(index){

    slides.forEach(slide =>
        slide.classList.remove("active")
    );

    dots.forEach(dot =>
        dot.classList.remove("active")
    );

    slides[index].classList.add("active");

    dots[index].classList.add("active");

}

setInterval(() => {

    currentSlide++;

    if(currentSlide >= slides.length){

        currentSlide = 0;

    }

    showSlide(currentSlide);

}, 4000);
</script>

</body>
</html>
