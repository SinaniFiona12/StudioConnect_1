<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AED Studios - Home</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

    <style>

        

        main{
            padding:20px;
        }

        .section-title{
            font-size:24px;
            margin-bottom:20px;
            font-weight:700;
        }

        .production-list{
            display:flex;
            flex-direction:column;
            gap:18px;
            margin-bottom:40px;
        }

        .production-card{
            background:var(--card-bg);
            border-radius:22px;
            padding:16px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.25);
        }

        .production-left{
            display:flex;
            gap:14px;
            flex:1;
        }

        .play-btn{
            width:52px;
            height:52px;
            border-radius:14px;
            background:#522725;
            border:1px solid #841F1A;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-shrink:0;
        }

        .play-icon{
            width:0;
            height:0;
            border-top:10px solid transparent;
            border-bottom:10px solid transparent;
            border-left:15px solid var(--accent-color);
            margin-left:4px;
        }

        .production-info h3{
            font-size:18px;
            margin-bottom:8px;
        }

        .production-info p{
            color:#9d9d9d;
            margin-bottom:4px;
            font-size:14px;
        }

        .time{
            margin-top:10px;
            color:#7f7f7f;
            font-size:14px;
        }

        .production-image{
            width:110px;
            height:110px;
            border-radius:18px;
            object-fit:cover;
            margin-left:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.25);
        }

        .company-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:16px;
        }

        .company-card{
            background:var(--card-bg);
            border-radius:22px;
            padding:24px 16px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.25);
        }

        .company-logo{
            width:70px;
            height:70px;
            border-radius:18px;
            object-fit:cover;
            margin-bottom:18px;
            box-shadow:0 10px 25px rgba(0,0,0,0.25);
        }

        .company-card h3{
            margin-bottom:8px;
            font-size:20px;
        }

        .company-card p{
            color:#8b8b8b;
            font-size:14px;
        }

        

    </style>
</head>
<body>

<header class="main-header">

    <div class="logo-area">

        <div class="logo-placeholder">
            <img src="./images/Logo.svg" alt="logo">
        </div>

        <div class="logo-text">

            <strong>AED STUDIOS</strong>

            <span>Creative Network</span>

        </div>

    </div>

    <div class="language-toggles">

        <button class="lang-btn" id="btn-nl">
            NL
        </button>

        <button class="lang-btn active" id="btn-en">
            EN
        </button>

        <button class="lang-btn" id="btn-fr">
            FR
        </button>

    </div>

</header>

<main>

    <section>

        <h2
            class="section-title"
            data-translate="activeProductions"
        ></h2>

        <div class="production-list" id="production-list"></div>

    </section>

    <section>

        <h2
            class="section-title"
            data-translate="companiesOnSite"
        ></h2>

        <div class="company-grid" id="company-grid"></div>

    </section>

</main>

<nav class="bottom-nav">

    <a href="index.html" class="nav-item active">

        <div class="nav-icon">
            <img src="./images/HomeIconfull.svg">
        </div>

        <span data-translate="navHome"></span>

    </a>

    <a href="map.html" class="nav-item">

        <div class="nav-icon">
            <img src="./images/MapIcontrans.svg">
        </div>

        <span data-translate="navMap"></span>

    </a>

    <a href="overview.html" class="nav-item">

        <div class="nav-icon">
            <img src="./images/StudioIcontrans.svg">
        </div>

        <span data-translate="navStudios"></span>

    </a>

    <a href="#" id="eventNavBtn" class="nav-item">

        <div class="nav-icon">
            <img src="./images/EventIcontrans.svg">
        </div>

        <span data-translate="navEvent"></span>

    </a>

</nav>

<script>

    const translations = {

        en: {

            activeProductions:
                "Active Productions",

            companiesOnSite:
                "Companies On Site",

            navHome:
                "Home",

            navMap:
                "Map",

            navStudios:
                "Studios",

            navEvent:
                "Event"

        },

        nl: {

            activeProductions:
                "Actieve Producties",

            companiesOnSite:
                "Bedrijven Op Locatie",

            navHome:
                "Home",

            navMap:
                "Kaart",

            navStudios:
                "Studio's",

            navEvent:
                "Event"

        },

        fr: {

            activeProductions:
                "Productions Actives",

            companiesOnSite:
                "Entreprises Sur Site",

            navHome:
                "Accueil",

            navMap:
                "Carte",

            navStudios:
                "Studios",

            navEvent:
                "Événement"

        }

    };

    function setLanguage(language){

        localStorage.setItem(
            "language",
            language
        );

        document
        .querySelectorAll(".lang-btn")
        .forEach(btn => {

            btn.classList.remove("active");

        });

        document
        .getElementById(`btn-${language}`)
        .classList.add("active");

        document
        .querySelectorAll("[data-translate]")
        .forEach(element => {

            const key =
                element.dataset.translate;

            element.textContent =
                translations[language][key];

        });

    }

    document
    .getElementById("btn-nl")
    .addEventListener("click", () => {

        setLanguage("nl");

    });

    document
    .getElementById("btn-en")
    .addEventListener("click", () => {

        setLanguage("en");

    });

    document
    .getElementById("btn-fr")
    .addEventListener("click", () => {

        setLanguage("fr");

    });

    const savedLanguage =

        localStorage.getItem("language")

        || "en";

    setLanguage(savedLanguage);

    const productions = [

        {
            title: "Famille",
            studio: "Studio 1",
            company: "Banijay",
            time: "08:00 - 18:00",
            image: "./images/Familie.svg"
        },

        {
            title: "The Voice",
            studio: "Studio 3",
            company: "Talpa Network",
            time: "10:00 - 22:00",
            image: "./images/Voice.svg"
        },

        {
            title: "Quiz with Balls",
            studio: "Studio 5",
            company: "Endemol Shine",
            time: "14:00 - 20:00",
            image: "./images/quiz.svg"
        }

    ];

    const companies = [

        {
            title: "De mensen",
            studio: "Studio 5, Studio 7",
            image: "./images/De mensen.svg"
        },

        {
            title: "Banijay",
            studio: "Studio 1 & 2",
            image: "./images/Banijay.svg"
        },

        {
            title: "VRT",
            studio: "Studio 4",
            image: "./images/Vrt.svg"
        },

        {
            title: "Talpa Network",
            studio: "Studio 3",
            image: "./images/Talpe network.svg"
        }

    ];

    const productionList =
        document.getElementById(
            'production-list'
        );

    productions.forEach(item => {

        productionList.innerHTML += `

            <div class="production-card">

                <div class="production-left">

                    <div class="play-btn">

                        <div class="play-icon"></div>

                    </div>

                    <div class="production-info">

                        <h3>${item.title}</h3>

                        <p>${item.studio}</p>

                        <p>${item.company}</p>

                        <div class="time">
                            ${item.time}
                        </div>

                    </div>

                </div>

                <img
                    class="production-image"
                    src="${item.image}"
                >

            </div>

        `;

    });

    const companyGrid =
        document.getElementById(
            'company-grid'
        );

    companies.forEach(item => {

        companyGrid.innerHTML += `

            <div class="company-card">

                <img
                    class="company-logo"
                    src="${item.image}"
                >

                <h3>${item.title}</h3>

                <p>${item.studio}</p>

            </div>

        `;

    });

    const eventNavBtn =
        document.getElementById(
            "eventNavBtn"
        );

    eventNavBtn.addEventListener(
        "click",
        (e) => {

            e.preventDefault();

            const access =
                sessionStorage.getItem(
                    "eventAccess"
                );

            if(access === "granted"){

                window.location.href =
                    "event-overview.html";

            }

            else{

                window.location.href =
                    "EventCode.html";

            }

        }
    );

</script>

</body>
</html>
