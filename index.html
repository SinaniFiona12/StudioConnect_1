<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>AED Studios - Home</title>

    <link rel="stylesheet" href="style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>

    <!-- =========================
         HEADER
    ========================== -->

    <header class="main-header">

      <div class="logo-area">

        <div class="logo-placeholder">
          <img
            src="./images/Logo.svg"
            alt="logo"
          />
        </div>

        <div class="logo-text">
          <strong>AED STUDIOS</strong>
          <span>Creative Network</span>
        </div>

      </div>

      <!-- LANGUAGE SWITCH -->

      <div class="language-toggles">

        <button
          class="lang-btn"
          id="btn-nl"
        >
          NL
        </button>

        <button
          class="lang-btn active"
          id="btn-en"
        >
          EN
        </button>

        <button
          class="lang-btn"
          id="btn-fr"
        >
          FR
        </button>

      </div>

    </header>

    <!-- =========================
         MAIN CONTENT
    ========================== -->

    <main>

      <!-- HERO SECTION -->

      <section class="hero-section">

        <div
          id="carousel"
          class="carousel"
        ></div>

        <div
          id="carouselDots"
          class="carousel-dots"
        ></div>

      </section>

      <!-- NEWS SECTION -->

      <section class="news-section">

        <div class="section-header">

          <h2 id="newsTitle">
            Nieuws
          </h2>

        </div>

        <div
          id="newsContainer"
          class="news-scroll"
        ></div>

      </section>

      <!-- PRODUCTIONS SECTION -->

      <section class="productions-section">

        <div class="section-header">

          <h2 id="productionsTitle">
            Actieve Producties
          </h2>

        </div>

        <div
          id="productionList"
          class="production-list"
        ></div>

      </section>

    </main>

    <!-- =========================
         BOTTOM NAVIGATION
    ========================== -->

    <nav class="bottom-nav">

      <!-- HOME -->

      <a
        href="./index.html"
        class="nav-item active"
      >

        <div class="nav-icon">

          <img
            src="./images/HomeIconfull.svg"
            alt="Home"
          />

        </div>

        <span id="navHome">
          Home
        </span>

      </a>

      <!-- MAP -->

      <a
        href="./map.html"
        class="nav-item"
      >

        <div class="nav-icon">

          <img
            src="./images/MapIcontrans.svg"
            alt="Map"
          />

        </div>

        <span id="navMap">
          Map
        </span>

      </a>

      <!-- STUDIOS -->

      <a
        href="overview.html"
        class="nav-item"
      >

        <div class="nav-icon">

          <img
            src="./images/StudioIcontrans.svg"
            alt="Studio's"
          />

        </div>

        <span id="navStudios">
          Studio's
        </span>

      </a>

      <!-- EVENT -->

      <a
        href="./eventCode.html"
        id="eventNavBtn"
        class="nav-item"
      >

        <div class="nav-icon">

          <img
            src="./images/EventIcontrans.svg"
            alt="Event"
          />

        </div>

        <span id="navEvent">
          Event
        </span>

      </a>

    </nav>

    <!-- =========================
         JAVASCRIPT
    ========================== -->

    <script
      type="module"
      src="./index.js"
    ></script>

  </body>
</html>
